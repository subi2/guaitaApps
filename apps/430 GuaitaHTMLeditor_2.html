<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuaitaHTMLeditor · Caixetí UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,300..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══ Tokens Caixetí ═══ */
:root{
  --paper:#F5F4EF; --card:#FFFFFF; --ink:#22262D; --ink-2:#69707B;
  --line:#D8D5CC; --line-forta:#B9B5A9;
  --blau:#1F4E8C; --blau-fosc:#153A6B; --blau-clar:#E8EEF7;
  --visat:#B3282D; --ok:#2E6B4F; --r:3px;
  --ui:'Archivo',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ui);background:var(--paper);color:var(--ink);font-size:14px}
button{font-family:var(--ui);cursor:pointer}
input,select{font-family:var(--ui);font-size:13px;color:var(--ink)}
:focus-visible{outline:2px solid var(--blau);outline-offset:1px}
.etq{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2)}

.btn{background:var(--card);border:1px solid var(--line-forta);border-radius:var(--r);
     padding:7px 12px;font-size:12.5px;font-weight:550;color:var(--ink)}
.btn:hover{border-color:var(--ink);background:#FBFAF7}
.btn.primari{background:var(--blau);border-color:var(--blau);color:#fff;font-weight:600}
.btn.primari:hover{background:var(--blau-fosc)}
.btn.petit{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.sel{background:var(--blau);border-color:var(--blau);color:#fff}

#toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:#fff;padding:9px 16px;border-radius:4px;font-size:12.5px;
  opacity:0;pointer-events:none;transition:all .22s;z-index:60;max-width:80vw}
#toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--visat)}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}

html,body{height:100%}
body{display:flex;flex-direction:column;overflow:hidden}

#caixeti{display:flex;align-items:stretch;border-bottom:1.5px solid var(--ink);
         background:var(--card);flex:0 0 auto}
.brand{display:flex;flex-direction:column;justify-content:center;padding:8px 16px;
       border-right:1px solid var(--line-forta);min-width:150px}
.brand .b1{font-family:var(--mono);font-weight:600;font-size:15px;letter-spacing:.14em}
.brand .b2{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--visat);margin-top:2px}
.proj{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 16px;
      min-width:0;border-right:1px solid var(--line-forta)}
.proj h1{font-variation-settings:'wdth' 110;font-weight:650;font-size:16px;
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj .sub{font-size:11.5px;color:var(--ink-2)}
.accions{display:flex;align-items:center;gap:8px;padding:0 14px}

/* Pestanyes de documents */
#pestanyes{display:flex;align-items:flex-end;gap:2px;background:var(--paper);
  border-bottom:1px solid var(--line-forta);padding:6px 10px 0;flex:0 0 auto;overflow-x:auto}
.ptab{display:flex;align-items:center;gap:7px;background:#EBE9E2;border:1px solid var(--line-forta);
  border-bottom:none;border-radius:4px 4px 0 0;padding:6px 10px;font-size:12.5px;cursor:pointer;
  max-width:200px;white-space:nowrap}
.ptab .nom{overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-size:11.5px}
.ptab.activa{background:var(--card);font-weight:600;position:relative;top:1px}
.ptab .brut{color:var(--visat);font-weight:700}
.ptab .tanca{border:none;background:none;color:var(--ink-2);font-size:13px;line-height:1;padding:0 1px}
.ptab .tanca:hover{color:var(--visat)}
#btnNouTab{border:1px dashed var(--line-forta);background:none;border-radius:4px 4px 0 0;
  padding:6px 10px;color:var(--ink-2);font-size:13px}
#btnNouTab:hover{border-color:var(--blau);color:var(--blau)}

/* Barra d'eines d'inserció */
#eines{display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:var(--card);
  border-bottom:1px solid var(--line);padding:5px 10px;flex:0 0 auto}
.eina{border:1px solid var(--line);background:#FBFAF7;border-radius:2px;padding:3px 7px;
  font-family:var(--mono);font-size:12px;min-width:26px}
.eina:hover{border-color:var(--blau);background:var(--blau-clar)}
.eina.snip{font-size:10.5px;letter-spacing:.03em}
.sepv{width:1px;height:18px;background:var(--line-forta);margin:0 4px}
#eines select{border:1px solid var(--line);border-radius:2px;padding:3px 5px;
  font-family:var(--mono);font-size:10.5px;background:#FBFAF7;max-width:130px}

/* Editor + previsualització */
#taula{flex:1;display:flex;min-height:0}
#panellCodi{display:flex;min-width:120px;min-height:0;background:#101418}
#nums{font-family:var(--mono);font-size:12.5px;line-height:1.5;color:#4A5560;text-align:right;
  padding:10px 6px 10px 10px;user-select:none;overflow:hidden;background:#0B0F13;white-space:pre}
#editorWrap{position:relative;flex:1;min-width:0}
#resaltat{position:absolute;inset:0;margin:0;padding:10px 12px;overflow:hidden;pointer-events:none;
  font-family:var(--mono);font-size:12.5px;line-height:1.5;white-space:pre;tab-size:2;
  color:#D7E3EE;background:#101418}
#codi{position:absolute;inset:0;width:100%;height:100%;background:transparent;color:transparent;
  caret-color:#F5F4EF;border:none;resize:none;outline:none;
  font-family:var(--mono);font-size:12.5px;line-height:1.5;padding:10px 12px;
  white-space:pre;overflow:auto;tab-size:2}
#codi.pla{color:#D7E3EE}
#codi::selection{background:rgba(31,78,140,.55);color:transparent}
#codi.pla::selection{color:#fff}
/* Tokens */
.t-tag{color:#7EC1FF}.t-pun{color:#8899AA}.t-attr{color:#CDF57A}.t-val{color:#E8C57C}
.t-com{color:#5E6B78;font-style:italic}.t-doc{color:#9B8CFF}.t-ent{color:#FFD166}
.t-cssP{color:#7EC1FF}.t-cssV{color:#E8C57C}.t-cssS{color:#CDF57A}
.t-jsK{color:#C792EA}.t-jsS{color:#E8C57C}.t-jsN{color:#F78C6C}.t-jsC{color:#5E6B78;font-style:italic}
/* Hover tip */
#hovertip{position:fixed;display:none;z-index:70;max-width:320px;pointer-events:none;
  background:var(--ink);color:#EAF0F5;border-radius:4px;padding:7px 10px;
  box-shadow:0 6px 24px rgba(0,0,0,.35);font-size:12px;line-height:1.45}
#hovertip .ht-titol{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
  color:#CDF57A;margin-bottom:3px;text-transform:none}
#hovertip.vis{display:block}
#divisor{width:7px;flex:0 0 auto;background:var(--line-forta);cursor:col-resize;position:relative}
#divisor:hover,#divisor.actiu{background:var(--blau)}
#panellRender{flex:1;display:flex;flex-direction:column;min-width:120px;min-height:0;background:#fff}
.capRender{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--card);
  border-bottom:1px solid var(--line);flex:0 0 auto}
#marc{flex:1;border:none;width:100%;background:#fff}

footer{flex:0 0 auto;display:flex;align-items:center;gap:16px;border-top:1px solid var(--line);
  background:var(--card);padding:5px 16px;font-family:var(--mono);font-size:10.5px;color:var(--ink-2)}
footer .sep{flex:1}

/* Barra de cerca */
#barraCerca{display:none;align-items:center;gap:6px;flex-wrap:wrap;background:var(--blau-clar);
  border-bottom:1px solid var(--blau);padding:6px 10px;flex:0 0 auto}
#barraCerca.oberta{display:flex}
#barraCerca input[type=text]{border:1px solid var(--line-forta);border-radius:2px;
  padding:4px 8px;font-family:var(--mono);font-size:12px;background:#fff;width:190px}
#barraCerca .check{display:flex;align-items:center;gap:4px;font-size:11px;
  font-family:var(--mono);color:var(--ink-2)}
#barraCerca .check input{accent-color:var(--blau)}
#barraCerca .compte{font-family:var(--mono);font-size:11px;color:var(--blau);min-width:64px}
#barraCerca .compte.zero{color:var(--visat)}
</style>
</head>
<body>

<header id="caixeti">
  <div class="brand"><span class="b1">GUAITA</span><span class="b2">HTML EDITOR</span></div>
  <div class="proj">
    <span class="etq">DOCUMENT ACTIU</span>
    <h1 id="ctxTitol">sense_titol.html</h1>
    <div class="sub" id="ctxSub">Nou document</div>
  </div>
  <div class="accions">
    <button class="btn" id="btnObrir">Obrir…</button>
    <input type="file" id="fileObrir" accept=".html,.htm,.xhtml,.txt" multiple style="display:none">
    <button class="btn" id="btnDesar">Desar</button>
    <button class="btn primari" id="btnDesarCom">Desar com…</button>

</header>

<div id="pestanyes"></div>

<div id="eines">
  <button class="eina" id="btnDesfes" title="Desfés (Ctrl+Z)" disabled>↶</button>
  <button class="eina" id="btnRefes" title="Refés (Ctrl+Y)" disabled>↷</button>
  <span class="sepv"></span>
  <span class="etq" style="margin-right:2px">CARÀCTERS</span>
  <span id="einesCars"></span>
  <span class="sepv"></span>
  <span class="etq" style="margin-right:2px">EMBOLCALLA</span>
  <span id="einesWrap"></span>
  <span class="sepv"></span>
  <span class="etq" style="margin-right:2px">SNIPPETS</span>
  <select id="selSnippet"><option value="">— insereix… —</option></select>
  <span class="sepv"></span>
  <button class="eina snip" id="btnObreCerca" title="Ctrl+F">🔍 CERCA</button>
  <span class="sepv"></span>
  <label class="etq" style="display:flex;align-items:center;gap:4px;cursor:pointer">

<div id="barraCerca">
  <input type="text" id="qCerca" placeholder="cerca… (Enter: següent)">
  <input type="text" id="qSubst" placeholder="substitueix per…">
  <span class="check"><input type="checkbox" id="qRegex"><span>regex</span></span>
  <span class="check"><input type="checkbox" id="qParaula"><span>paraula</span></span>
  <span class="check"><input type="checkbox" id="qMajus"><span>Aa</span></span>
  <span class="check"><input type="checkbox" id="qAccents"><span>àé</span></span>
  <button class="btn petit" id="qPrev">‹</button>
  <button class="btn petit" id="qNext">›</button>
  <span class="compte" id="qCompte">—</span>
  <button class="btn petit" id="qSubstUn">Substituir</button>
  <button class="btn petit" id="qSubstTot">Tot</button>
  <span style="flex:1"></span>
  <button class="btn petit" id="qTanca">✕ (Esc)</button>
</div>

<div id="taula">
  <div id="panellCodi" style="width:50%">
    <div id="nums">1</div>
    <div id="editorWrap">
      <pre id="resaltat"><code id="resaltatCodi"></code></pre>
      <textarea id="codi" spellcheck="false" wrap="off"></textarea>
    </div>
  </div>
  <div id="divisor" title="Arrossega per redimensionar"></div>
  <div id="panellRender">
    <div class="capRender">
      <span class="etq">PREVISUALITZACIÓ</span>
      <span style="flex:1"></span>
      <label class="etq" style="display:flex;align-items:center;gap:5px;cursor:pointer">
        <input type="checkbox" id="syncScroll" checked style="accent-color:var(--blau)">SYNC</label>
      <label class="etq" style="display:flex;align-items:center;gap:5px;cursor:pointer">
        <input type="checkbox" id="autoRender" checked style="accent-color:var(--blau)">AUTO</label>
      <button class="btn petit" id="btnRefresca">Refrescar</button>

</div>

<footer>
  <span id="footPos">Ln 1, Col 1</span>
  <span id="footMida">0 caràcters</span>
  <span class="sep"></span>
  <span id="footFS"></span>
</footer>

<div id="toast" role="status"></div>
<div id="hovertip" role="tooltip"><div class="ht-titol" id="htTitol"></div><div id="htText"></div></div>

<script>
/* ═══════════════════════════════════════════════════════════
   GUAITAHTMLEDITOR · nucli d'edició (funcions pures testables)
   ═══════════════════════════════════════════════════════════ */

// Insereix text a la posició de selecció; retorna nou valor i posició de cursor.
// Si el text conté '|', marca la posició final del cursor (i s'elimina del resultat).
function insereixText(valor, selStart, selEnd, text) {
  let cursorRel = text.indexOf('|');
  let net = text;
  if (cursorRel >= 0) net = text.slice(0, cursorRel) + text.slice(cursorRel + 1);
  else cursorRel = net.length;
  const nou = valor.slice(0, selStart) + net + valor.slice(selEnd);
  return { valor: nou, selStart: selStart + cursorRel, selEnd: selStart + cursorRel };
}

// Embolcalla la selecció amb obre/tanca; si no hi ha selecció, deixa el cursor entremig.
function embolcalla(valor, selStart, selEnd, obre, tanca) {
  const seleccio = valor.slice(selStart, selEnd);
  const nou = valor.slice(0, selStart) + obre + seleccio + tanca + valor.slice(selEnd);
  if (selStart === selEnd) {
    const p = selStart + obre.length;
    return { valor: nou, selStart: p, selEnd: p };
  }
  return { valor: nou, selStart: selStart + obre.length, selEnd: selEnd + obre.length };
}

// Indentació per a Enter: copia els espais/tabs inicials de la línia actual
// i afegeix un nivell si la línia acaba obrint etiqueta (">" d'una etiqueta no auto-tancada senzilla: heurística '>' final i no '/>' ni tanca).
function indentacioNovaLinia(valor, pos) {
  const iniciLinia = valor.lastIndexOf('\n', pos - 1) + 1;
  const linia = valor.slice(iniciLinia, pos);
  const m = linia.match(/^[ \t]*/);
  let indent = m ? m[0] : '';
  if (/<[a-zA-Z][^>]*[^/]>\s*$/.test(linia) && !/<\/[a-zA-Z][^>]*>\s*$/.test(linia)) {
    indent += '  ';
  }
  return indent;
}

// Insereix tabulació (2 espais) o indenta el bloc seleccionat
function tabulacio(valor, selStart, selEnd, treu) {
  if (selStart === selEnd && !treu) {
    return insereixText(valor, selStart, selEnd, '  ');
  }
  const inici = valor.lastIndexOf('\n', selStart - 1) + 1;
  const tros = valor.slice(inici, selEnd);
  let noves;
  if (treu) noves = tros.replace(/(^|\n)  /g, '$1');
  else noves = tros.replace(/(^|\n)/g, '$1  ');
  const delta = noves.length - tros.length;
  const nou = valor.slice(0, inici) + noves + valor.slice(selEnd);
  return { valor: nou, selStart: Math.max(inici, selStart + (treu ? -2 : 2)), selEnd: selEnd + delta };
}

function plantillaBase(titol) {
  return `<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${titol || 'Document'}</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
  </style>
</head>
<body>

  <h1>${titol || 'Document'}</h1>
  <p></p>

</body>
</html>`;
}

// Taules d'eines: caràcters habituals i snippets ('|' marca el cursor)
const CARACTERS = [
  ['—', '—'], ['–', '–'], ['·', '·'], ['«', '«'], ['»', '»'],
  ['“', '“'], ['”', '”'], ['…', '…'], ['©', '©'], ['°', '°'],
  ['±', '±'], ['×', '×'], ['→', '→'], ['€', '€'],
  ['&nbsp;', '&nbsp;'], ['&amp;', '&amp;'], ['&lt;', '&lt;'], ['&gt;', '&gt;']
];

const WRAPS = [
  ['B', '<strong>', '</strong>'], ['I', '<em>', '</em>'], ['U', '<u>', '</u>'],
  ['H2', '<h2>', '</h2>'], ['H3', '<h3>', '</h3>'], ['P', '<p>', '</p>'],
  ['A', '<a href="">', '</a>'], ['DIV', '<div>', '</div>'], ['SPAN', '<span>', '</span>'],
  ['CODE', '<code>', '</code>'], ['PRE', '<pre>', '</pre>']
];

const SNIPPETS = [
  ['Plantilla HTML5', null], // especial: substitueix tot si el document és buit
  ['Paràgraf <p>', '<p>|</p>'],
  ['Enllaç <a>', '<a href="|" target="_blank" rel="noopener"></a>'],
  ['Imatge <img>', '<img src="|" alt="" width="" height="">'],
  ['Llista <ul>', '<ul>\n  <li>|</li>\n  <li></li>\n</ul>'],
  ['Llista <ol>', '<ol>\n  <li>|</li>\n  <li></li>\n</ol>'],
  ['Taula 3×3', '<table>\n  <thead>\n    <tr><th>|</th><th></th><th></th></tr>\n  </thead>\n  <tbody>\n    <tr><td></td><td></td><td></td></tr>\n    <tr><td></td><td></td><td></td></tr>\n  </tbody>\n</table>'],
  ['Figura + peu', '<figure>\n  <img src="|" alt="">\n  <figcaption></figcaption>\n</figure>'],
  ['Formulari bàsic', '<form action="#" method="post">\n  <label for="camp">|</label>\n  <input type="text" id="camp" name="camp">\n  <button type="submit">Envia</button>\n</form>'],
  ['Secció + h2', '<section>\n  <h2>|</h2>\n  <p></p>\n</section>'],
  ['CSS enllaçat', '<link rel="stylesheet" href="|">'],
  ['Bloc <style>', '<style>\n  |\n</style>'],
  ['Bloc <script>', '<script>\n  |\n<\/script>'],
  ['Meta viewport', '<meta name="viewport" content="width=device-width, initial-scale=1.0">|'],
  ['Comentari', '<!-- | -->'],
  ['Salt <br>', '<br>|'],
  ['Vídeo <video>', '<video src="|" controls width="640"></video>'],
  ['Detalls plegables', '<details>\n  <summary>|</summary>\n  <p></p>\n</details>']
];

// ── Resaltat de sintaxi ──────────────────────────────────────
// tokenitzaHTML(text) → [{c: classeCSS|null, t: text}] cobrint tot el text.

const VOID_TAGS = new Set(['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input',
  'link', 'meta', 'param', 'source', 'track', 'wbr']);

const JS_KEYWORDS = new Set(('var let const function return if else for while do switch case ' +
  'break continue new delete typeof instanceof in of class extends super this null true false ' +
  'undefined try catch finally throw async await yield import export default static get set').split(' '));

function lexJS(s) {
  const out = [];
  let i = 0;
  while (i < s.length) {
    const c = s[i];
    if (c === '/' && s[i + 1] === '/') {
      let j = s.indexOf('\n', i); if (j < 0) j = s.length;
      out.push({ c: 't-jsC', t: s.slice(i, j) }); i = j; continue;
    }
    if (c === '/' && s[i + 1] === '*') {
      let j = s.indexOf('*/', i + 2); j = j < 0 ? s.length : j + 2;
      out.push({ c: 't-jsC', t: s.slice(i, j) }); i = j; continue;
    }
    if (c === '"' || c === "'" || c === '`') {
      let j = i + 1;
      while (j < s.length && s[j] !== c) { if (s[j] === '\\') j++; j++; }
      j = Math.min(s.length, j + 1);
      out.push({ c: 't-jsS', t: s.slice(i, j) }); i = j; continue;
    }
    if (/[0-9]/.test(c)) {
      let j = i;
      while (j < s.length && /[0-9a-fA-FxX.eE+-]/.test(s[j])) j++;
      out.push({ c: 't-jsN', t: s.slice(i, j) }); i = j; continue;
    }
    if (/[A-Za-z_$]/.test(c)) {
      let j = i;
      while (j < s.length && /[A-Za-z0-9_$]/.test(s[j])) j++;
      const w = s.slice(i, j);
      out.push({ c: JS_KEYWORDS.has(w) ? 't-jsK' : null, t: w }); i = j; continue;
    }
    let j = i + 1;
    while (j < s.length && !/[/"'`0-9A-Za-z_$]/.test(s[j])) j++;
    out.push({ c: null, t: s.slice(i, j) }); i = j;
  }
  return out;
}

function lexCSS(s) {
  const out = [];
  let i = 0, dinsBloc = false;
  while (i < s.length) {
    const c = s[i];
    if (c === '/' && s[i + 1] === '*') {
      let j = s.indexOf('*/', i + 2); j = j < 0 ? s.length : j + 2;
      out.push({ c: 't-com', t: s.slice(i, j) }); i = j; continue;
    }
    if (c === '{') { dinsBloc = true; out.push({ c: 't-pun', t: c }); i++; continue; }
    if (c === '}') { dinsBloc = false; out.push({ c: 't-pun', t: c }); i++; continue; }
    if (!dinsBloc) {
      let j = i;
      while (j < s.length && s[j] !== '{' && !(s[j] === '/' && s[j + 1] === '*')) j++;
      if (j > i) { out.push({ c: 't-cssS', t: s.slice(i, j) }); i = j; continue; }
    } else {
      if (c === ':') {
        let j = i + 1;
        while (j < s.length && s[j] !== ';' && s[j] !== '}' && !(s[j] === '/' && s[j + 1] === '*')) j++;
        out.push({ c: 't-pun', t: ':' });
        out.push({ c: 't-cssV', t: s.slice(i + 1, j) });
        i = j; continue;
      }
      if (c === ';') { out.push({ c: 't-pun', t: c }); i++; continue; }
      let j = i;
      while (j < s.length && !/[:;}]/.test(s[j]) && !(s[j] === '/' && s[j + 1] === '*')) j++;
      if (j > i) { out.push({ c: 't-cssP', t: s.slice(i, j) }); i = j; continue; }
    }
    out.push({ c: null, t: c }); i++;
  }
  return out;
}

function lexDinsEtiqueta(s) {
  // s: contingut entre el nom d'etiqueta i '>' (atributs)
  const out = [];
  let i = 0;
  while (i < s.length) {
    const c = s[i];
    if (c === '"' || c === "'") {
      let j = s.indexOf(c, i + 1); j = j < 0 ? s.length : j + 1;
      out.push({ c: 't-val', t: s.slice(i, j) }); i = j; continue;
    }
    if (/[A-Za-z_:-]/.test(c)) {
      let j = i;
      while (j < s.length && /[A-Za-z0-9_.:-]/.test(s[j])) j++;
      out.push({ c: 't-attr', t: s.slice(i, j) }); i = j; continue;
    }
    let j = i + 1;
    while (j < s.length && !/["'A-Za-z_:-]/.test(s[j])) j++;
    out.push({ c: c === '=' ? 't-pun' : null, t: s.slice(i, j) }); i = j;
  }
  return out;
}

function tokenitzaHTML(text) {
  const out = [];
  let i = 0;
  while (i < text.length) {
    const c = text[i];
    if (c === '<') {
      if (text.startsWith('<!--', i)) {
        let j = text.indexOf('-->', i + 4); j = j < 0 ? text.length : j + 3;
        out.push({ c: 't-com', t: text.slice(i, j) }); i = j; continue;
      }
      if (text[i + 1] === '!') {
        let j = text.indexOf('>', i); j = j < 0 ? text.length : j + 1;
        out.push({ c: 't-doc', t: text.slice(i, j) }); i = j; continue;
      }
      const mTag = /^<\/?([A-Za-z][A-Za-z0-9-]*)/.exec(text.slice(i));
      if (mTag) {
        const nom = mTag[1].toLowerCase();
        out.push({ c: 't-pun', t: text[i + 1] === '/' ? '</' : '<' });
        out.push({ c: 't-tag', t: mTag[1] });
        let j = i + mTag[0].length;
        let fi = text.indexOf('>', j);
        if (fi < 0) fi = text.length;
        // atributs
        const dins = text.slice(j, fi);
        const autoTanca = dins.endsWith('/');
        lexDinsEtiqueta(autoTanca ? dins.slice(0, -1) : dins).forEach(t => out.push(t));
        if (autoTanca) out.push({ c: 't-pun', t: '/' });
        if (fi < text.length) out.push({ c: 't-pun', t: '>' });
        i = Math.min(text.length, fi + 1);
        // contingut cru de <script>/<style> amb sub-lexer
        if (text[i - 1] === '>' && (nom === 'script' || nom === 'style') && mTag[0][1] !== '/') {
          const tancaRE = new RegExp('</' + nom + '\\b', 'i');
          const m2 = tancaRE.exec(text.slice(i));
          const fiCos = m2 ? i + m2.index : text.length;
          const cos = text.slice(i, fiCos);
          (nom === 'script' ? lexJS(cos) : lexCSS(cos)).forEach(t => out.push(t));
          i = fiCos;
        }
        continue;
      }
      out.push({ c: null, t: '<' }); i++; continue;
    }
    if (c === '&') {
      const mEnt = /^&#?[A-Za-z0-9]{1,10};/.exec(text.slice(i));
      if (mEnt) { out.push({ c: 't-ent', t: mEnt[0] }); i += mEnt[0].length; continue; }
    }
    let j = i;
    while (j < text.length && text[j] !== '<' && text[j] !== '&') j++;
    if (j === i) j = i + 1; // '&' solt: consumeix-lo com a text
    out.push({ c: null, t: text.slice(i, j) }); i = j;
  }
  return out;
}

function escapaHTML(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// text pla → HTML resaltat (spans amb classes t-*)
function resaltaHTML(text) {
  return tokenitzaHTML(text).map(tok =>
    tok.c ? '<span class="' + tok.c + '">' + escapaHTML(tok.t) + '</span>' : escapaHTML(tok.t)
  ).join('');
}

// ── Helpers d'edició de línies ──
function limitsLinia(valor, pos) {
  const inici = valor.lastIndexOf('\n', pos - 1) + 1;
  let fi = valor.indexOf('\n', pos);
  if (fi < 0) fi = valor.length;
  return { inici, fi };
}

// Duplica la línia del cursor; cursor a la còpia
function duplicaLinia(valor, pos) {
  const { inici, fi } = limitsLinia(valor, pos);
  const linia = valor.slice(inici, fi);
  const nou = valor.slice(0, fi) + '\n' + linia + valor.slice(fi);
  const desp = pos - inici;
  return { valor: nou, selStart: fi + 1 + desp, selEnd: fi + 1 + desp };
}

// Mou la línia (o bloc de línies seleccionat) amunt (-1) o avall (+1)
function mouLinia(valor, selStart, selEnd, dir) {
  const linies = valor.split('\n');
  let acc = 0, l0 = 0, l1 = 0;
  for (let i = 0; i < linies.length; i++) {
    if (acc <= selStart) l0 = i;
    if (acc <= Math.max(selStart, selEnd - 1)) l1 = i;
    acc += linies[i].length + 1;
  }
  if (dir < 0 && l0 === 0) return { valor, selStart, selEnd };
  if (dir > 0 && l1 === linies.length - 1) return { valor, selStart, selEnd };
  const veina = dir < 0 ? linies[l0 - 1] : linies[l1 + 1];
  const bloc = linies.splice(l0, l1 - l0 + 1);
  linies.splice(l0 + dir, 0, ...bloc);
  const despl = dir * (veina.length + 1);
  return { valor: linies.join('\n'), selStart: selStart + despl, selEnd: selEnd + despl };
}

// Comenta o descomenta la selecció amb <!-- -->
function comentaHTML(valor, selStart, selEnd) {
  if (selStart === selEnd) {
    const l = limitsLinia(valor, selStart);
    selStart = l.inici; selEnd = l.fi;
  }
  const tros = valor.slice(selStart, selEnd);
  const jaComentat = /^\s*<!--[\s\S]*-->\s*$/.test(tros);
  let nou;
  if (jaComentat) {
    nou = tros.replace(/^(\s*)<!--\s?/, '$1').replace(/\s?-->(\s*)$/, '$1');
  } else {
    nou = '<!-- ' + tros + ' -->';
  }
  return {
    valor: valor.slice(0, selStart) + nou + valor.slice(selEnd),
    selStart, selEnd: selStart + nou.length
  };
}

// Última etiqueta oberta sense tancar abans de pos (per autocompletar '</')
function ultimaEtiquetaOberta(text, pos) {
  const pila = [];
  const re = /<(\/?)([A-Za-z][A-Za-z0-9-]*)((?:"[^"]*"|'[^']*'|[^>"'])*)>/g;
  const tros = text.slice(0, pos);
  let m;
  while ((m = re.exec(tros)) !== null) {
    const nom = m[2].toLowerCase();
    if (VOID_TAGS.has(nom) || m[3].trimEnd().endsWith('/')) continue;
    if (m[1]) {
      // tanca: desapila fins trobar-la
      for (let i = pila.length - 1; i >= 0; i--) {
        if (pila[i] === nom) { pila.length = i; break; }
      }
    } else pila.push(nom);
  }
  return pila.length ? pila[pila.length - 1] : null;
}

// Validador d'etiquetes desaparellades; retorna [{linia (1-based), missatge}]
function validaEtiquetes(text) {
  const errors = [];
  const pila = []; // {nom, linia}
  // neutralitza comentaris i contingut de script/style per no confondre el validador
  const net = text
    .replace(/<!--[\s\S]*?-->/g, s => s.replace(/[^\n]/g, ' '))
    .replace(/<(script|style)\b[^>]*>[\s\S]*?<\/\1\s*>/gi, s => {
      const obre = s.indexOf('>') + 1;
      const tanca = s.toLowerCase().lastIndexOf('</');
      return s.slice(0, obre) + s.slice(obre, tanca).replace(/[^\n]/g, ' ') + s.slice(tanca);
    });
  const re = /<(\/?)([A-Za-z][A-Za-z0-9-]*)((?:"[^"]*"|'[^']*'|[^>"'])*)>/g;
  let m;
  while ((m = re.exec(net)) !== null) {
    const linia = net.slice(0, m.index).split('\n').length;
    const nom = m[2].toLowerCase();
    if (VOID_TAGS.has(nom) || m[3].trimEnd().endsWith('/')) continue;
    if (!m[1]) { pila.push({ nom, linia }); continue; }
    // etiqueta de tancament
    if (pila.length && pila[pila.length - 1].nom === nom) { pila.pop(); continue; }
    const idx = pila.map(p => p.nom).lastIndexOf(nom);
    if (idx < 0) {
      errors.push({ linia, missatge: `«</${nom}>» a la línia ${linia} no té obertura` });
    } else {
      for (let i = pila.length - 1; i > idx; i--) {
        errors.push({ linia: pila[i].linia, missatge: `«<${pila[i].nom}>» obert a la línia ${pila[i].linia} no s'ha tancat abans de «</${nom}>» (línia ${linia})` });
      }
      pila.length = idx;
    }
  }
  pila.forEach(p => errors.push({ linia: p.linia, missatge: `«<${p.nom}>» obert a la línia ${p.linia} no es tanca mai` }));
  errors.sort((a, b) => a.linia - b.linia);
  return errors;
}

// Troba el token que conté l'offset; retorna {token, inici, fi} o null
function tokenAOffset(tokens, offset) {
  let acc = 0;
  for (const t of tokens) {
    const fi = acc + t.t.length;
    if (offset >= acc && offset < fi) return { token: t, inici: acc, fi };
    acc = fi;
  }
  return null;
}

// Explica un token per al hover tip; retorna {titol, text} o null si no hi ha res a dir
function explicaToken(token) {
  if (!token || !token.t.trim()) return null;
  const t = token.t, c = token.c;
  if (c === 't-tag') {
    const info = TAGS_INFO[t.toLowerCase()];
    return { titol: '<' + t.toLowerCase() + '>', text: info || 'Etiqueta HTML.' };
  }
  if (c === 't-attr') {
    const info = ATTRS_INFO[t];
    return info ? { titol: t + ' (atribut)', text: info } : { titol: t, text: 'Atribut de l\'etiqueta.' };
  }
  if (c === 't-val') return { titol: 'valor d\'atribut', text: 'Valor assignat a l\'atribut anterior.' };
  if (c === 't-com') return { titol: 'comentari', text: 'No es mostra al navegador; només és visible al codi font.' };
  if (c === 't-doc') return { titol: 'DOCTYPE', text: 'Declara el tipus de document. <!DOCTYPE html> indica HTML5 i ha de ser la primera línia.' };
  if (c === 't-ent') {
    const info = ENTITATS_INFO[t.toLowerCase()];
    return { titol: t, text: 'Entitat HTML: ' + (info || 'representa un caràcter especial') + '.' };
  }
  if (c === 't-cssP') {
    const nom = t.trim().toLowerCase();
    const info = CSS_INFO[nom];
    return info ? { titol: nom + ' (CSS)', text: info } : { titol: nom, text: 'Propietat CSS.' };
  }
  if (c === 't-cssV') return { titol: 'valor CSS', text: 'Valor de la propietat anterior.' };
  if (c === 't-cssS') {
    const s = t.trim();
    if (!s) return null;
    let text = 'Selector CSS: tria a quins elements s\'apliquen les regles.';
    if (s.startsWith('.')) text = 'Selector de classe: elements amb class="' + s.slice(1).split(/[\s,:.[]/)[0] + '".';
    else if (s.startsWith('#')) text = 'Selector d\'id: l\'element amb id="' + s.slice(1).split(/[\s,:.[]/)[0] + '".';
    return { titol: s.split('\n')[0].slice(0, 40), text };
  }
  if (c === 't-jsK') {
    const info = JS_INFO[t];
    return info ? { titol: t + ' (JS)', text: info } : { titol: t, text: 'Paraula clau de JavaScript.' };
  }
  if (c === 't-jsS') return { titol: 'cadena (JS)', text: 'Text literal entre cometes.' };
  if (c === 't-jsN') return { titol: 'número (JS)', text: 'Valor numèric literal.' };
  if (c === 't-jsC') return { titol: 'comentari (JS)', text: 'No s\'executa; serveix per documentar el codi.' };
  return null;
}

// ── Historial de desfer/refer ──
// Pila d'estats {valor, selStart, selEnd}; idx apunta a l'estat actual.
const LIMIT_HISTORIAL = 200;

function creaHistorial(valor, selStart, selEnd) {
  return { pila: [{ valor, selStart: selStart || 0, selEnd: selEnd || 0 }], idx: 0 };
}

// Registra un estat nou. Si fusiona=true i som al cim, substitueix el cim
// (coalescència de tecleig). Retalla la branca de refer i limita la mida.
function registraHistorial(hist, valor, selStart, selEnd, fusiona) {
  const actual = hist.pila[hist.idx];
  if (actual && actual.valor === valor) return hist; // cap canvi real
  if (fusiona && hist.idx === hist.pila.length - 1 && hist.idx > 0) {
    hist.pila[hist.idx] = { valor, selStart, selEnd };
    return hist;
  }
  hist.pila.length = hist.idx + 1; // talla el refer pendent
  hist.pila.push({ valor, selStart, selEnd });
  if (hist.pila.length > LIMIT_HISTORIAL) hist.pila.shift();
  hist.idx = hist.pila.length - 1;
  return hist;
}

function potDesfer(hist) { return !!hist && hist.idx > 0; }
function potRefer(hist) { return !!hist && hist.idx < hist.pila.length - 1; }

function desfesHistorial(hist) {
  if (!potDesfer(hist)) return null;
  hist.idx--;
  return hist.pila[hist.idx];
}

function refesHistorial(hist) {
  if (!potRefer(hist)) return null;
  hist.idx++;
  return hist.pila[hist.idx];
}

// ── Cerca avançada sobre el text sencer ──
function treuAccents(s) {
  return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// opts: { regex, paraulaSencera, majuscules, accents }
// Retorna [{inici, fi}] amb offsets absoluts; llença Error si la regex és invàlida.
function cercaText(text, consulta, opts) {
  if (!consulta) return [];
  opts = opts || {};
  if (!opts.accents) consulta = treuAccents(consulta);
  let font = opts.regex ? consulta : consulta.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  if (opts.paraulaSencera) {
    font = '(?<![\\p{L}\\p{N}_])(?:' + font + ')(?![\\p{L}\\p{N}_])';
  }
  const re = new RegExp(font, 'g' + (opts.majuscules ? '' : 'i') + 'u');
  let paller = text;
  if (!opts.accents) {
    const sense = treuAccents(text);
    if (sense.length === text.length) paller = sense; // offsets preservats
  }
  const out = [];
  let m;
  while ((m = re.exec(paller)) !== null) {
    out.push({ inici: m.index, fi: m.index + (m[0].length || 1) });
    if (m[0].length === 0) re.lastIndex++;
    if (out.length >= 5000) break;
  }
  return out;
}

// Substitueix una coincidència {inici, fi} per 'reemplac'; retorna nou valor i delta de longitud.
function substitueixEn(valor, coincidencia, reemplac) {
  const nou = valor.slice(0, coincidencia.inici) + reemplac + valor.slice(coincidencia.fi);
  return { valor: nou, delta: reemplac.length - (coincidencia.fi - coincidencia.inici) };
}

// Substitueix totes les coincidències (de darrere cap endavant per no invalidar offsets).
function substitueixTot(valor, coincidencies, reemplac) {
  let v = valor;
  for (let i = coincidencies.length - 1; i >= 0; i--) {
    v = v.slice(0, coincidencies[i].inici) + reemplac + v.slice(coincidencies[i].fi);
  }
  return v;
}

if (typeof window !== 'undefined') {
  window.GE = { tokenAOffset, explicaToken,
    creaHistorial, registraHistorial, desfesHistorial, refesHistorial, potDesfer, potRefer,
    insereixText, embolcalla, indentacioNovaLinia, tabulacio, plantillaBase,
    treuAccents, cercaText, substitueixEn, substitueixTot,
    tokenitzaHTML, resaltaHTML, duplicaLinia, mouLinia, comentaHTML,
    ultimaEtiquetaOberta, validaEtiquetes, CARACTERS, WRAPS, SNIPPETS };
}
if (typeof module !== 'undefined' && module.exports) {
  module.exports = { tokenAOffset, explicaToken,
    creaHistorial, registraHistorial, desfesHistorial, refesHistorial, potDesfer, potRefer,
    insereixText, embolcalla, indentacioNovaLinia, tabulacio, plantillaBase,
    treuAccents, cercaText, substitueixEn, substitueixTot,
    tokenitzaHTML, resaltaHTML, duplicaLinia, mouLinia, comentaHTML,
    ultimaEtiquetaOberta, validaEtiquetes, CARACTERS, WRAPS, SNIPPETS };
}
</script>

<script>
/* ═══ Interfície ═══ */
(function () {
  if (typeof document === 'undefined') return;

  const DB_NAME = 'guaita_htmleditor_db', STORE = 'sessio';
  let db = null;
  let comptadorNous = 1;

  const estat = { docs: [], actiuId: null };
  // doc: { id, nom, contingut, brut, handle? (no persistit) }

  const $ = s => document.querySelector(s);
  const codi = $('#codi');
  const teFS = typeof window.showSaveFilePicker === 'function';

  function toast(msg, err) {
    const t = $('#toast'); t.textContent = msg;
    t.className = 'vis' + (err ? ' err' : '');
    clearTimeout(t._t); t._t = setTimeout(() => t.className = '', 3200);
  }
  function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
  function genId() { return 'doc_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 5); }
  function actiu() { return estat.docs.find(d => d.id === estat.actiuId) || null; }

  // ── IndexedDB: persistir sessió (nom + contingut, sense handles) ──
  function obreDB() {
    return new Promise(res => {
      if (typeof indexedDB === 'undefined') { res(null); return; }
      const rq = indexedDB.open(DB_NAME, 1);
      rq.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: 'k' });
      };
      rq.onsuccess = e => res(e.target.result);
      rq.onerror = () => res(null);
    });
  }
  let desaTimer = null;
  function desaSessio() {
    if (!db) return;
    clearTimeout(desaTimer);
    desaTimer = setTimeout(() => {
      const docs = estat.docs.map(d => ({ id: d.id, nom: d.nom, contingut: d.contingut, brut: d.brut }));
      db.transaction(STORE, 'readwrite').objectStore(STORE)
        .put({ k: 'sessio', docs, actiuId: estat.actiuId });
    }, 400);
  }
  function carregaSessio() {
    return new Promise(res => {
      if (!db) { res(); return; }
      const rq = db.transaction(STORE, 'readonly').objectStore(STORE).get('sessio');
      rq.onsuccess = () => {
        if (rq.result && rq.result.docs && rq.result.docs.length) {
          estat.docs = rq.result.docs;
          estat.actiuId = rq.result.actiuId;
          if (!actiu()) estat.actiuId = estat.docs[0].id;
        }
        res();
      };
      rq.onerror = () => res();
    });
  }

  // ── Gestió de documents ──
  function nouDocument(nom, contingut) {
    const d = {
      id: genId(),
      nom: nom || `sense_titol_${comptadorNous++}.html`,
      contingut: contingut != null ? contingut : window.GE.plantillaBase('Document nou'),
      brut: false, handle: null
    };
    estat.docs.push(d);
    activa(d.id);
    desaSessio();
    return d;
  }

  function activa(id) {
    const anterior = actiu();
    if (anterior) anterior.contingut = codi.value;
    estat.actiuId = id;
    const d = actiu();
    codi.value = d ? d.contingut : '';
    renderTabs();
    renderCapcalera();
    renderNums();
    renderResaltat(true);
    renderMarc();
    actualitzaBotonsHist();
    codi.focus();
  }

  function tancaDocument(id) {
    const d = estat.docs.find(x => x.id === id);
    if (!d) return;
    if (d.brut && !confirm(`«${d.nom}» té canvis sense desar. Tancar igualment?`)) return;
    const idx = estat.docs.indexOf(d);
    estat.docs.splice(idx, 1);
    if (estat.actiuId === id) {
      if (!estat.docs.length) nouDocument();
      else activa(estat.docs[Math.max(0, idx - 1)].id);
    } else {
      renderTabs();
    }
    desaSessio();
  }

  // ── Render UI ──
  function renderTabs() {
    const cont = $('#pestanyes');
    cont.innerHTML = '';
    estat.docs.forEach(d => {
      const t = document.createElement('div');
      t.className = 'ptab' + (d.id === estat.actiuId ? ' activa' : '');
      t.innerHTML = `<span class="nom">${esc(d.nom)}</span>` +
        (d.brut ? '<span class="brut">●</span>' : '') +
        `<button class="tanca" title="Tancar">×</button>`;
      t.addEventListener('click', e => {
        if (e.target.classList.contains('tanca')) { tancaDocument(d.id); return; }
        if (d.id !== estat.actiuId) activa(d.id);
      });
      t.addEventListener('dblclick', e => {
        if (e.target.classList.contains('tanca')) return;
        const nou = prompt('Nom del document:', d.nom);
        if (nou && nou.trim()) {
          d.nom = nou.trim();
          if (!/\.(html?|xhtml|txt)$/i.test(d.nom)) d.nom += '.html';
          renderTabs(); renderCapcalera(); desaSessio();
        }
      });
      cont.appendChild(t);
    });
    const mes = document.createElement('button');
    mes.id = 'btnNouTab';
    mes.textContent = '＋';
    mes.title = 'Nou document';
    mes.addEventListener('click', () => nouDocument());
    cont.appendChild(mes);
  }

  function renderCapcalera() {
    const d = actiu();
    $('#ctxTitol').textContent = d ? d.nom : '—';
    $('#ctxSub').textContent = d
      ? (d.handle ? 'Vinculat al disc (Desar sobreescriu)' : (d.brut ? 'Canvis sense desar' : 'Sense canvis pendents'))
      : '';
  }

  function renderNums() {
    const n = codi.value.split('\n').length;
    let s = '';
    for (let i = 1; i <= n; i++) s += i + '\n';
    $('#nums').textContent = s;
    $('#nums').scrollTop = codi.scrollTop;
    $('#footMida').textContent = codi.value.length.toLocaleString('ca') + ' caràcters · ' + n + ' línies';
  }

  // ── Resaltat de sintaxi (overlay) ──
  const LIMIT_RESALTAT = 200000;
  let resaltaTimer = null, avisatGran = false, tokensCache = null;
  function renderResaltat(immediat) {
    clearTimeout(resaltaTimer);
    const fes = () => {
      const actiuColor = $('#chkColor').checked && codi.value.length <= LIMIT_RESALTAT;
      if ($('#chkColor').checked && codi.value.length > LIMIT_RESALTAT && !avisatGran) {
        avisatGran = true;
        toast('Document gran: resaltat desactivat per rendiment.');
      }
      codi.classList.toggle('pla', !actiuColor);
      if (actiuColor) {
        tokensCache = window.GE.tokenitzaHTML(codi.value);
        $('#resaltatCodi').innerHTML = tokensCache.map(tok =>
          tok.c ? '<span class="' + tok.c + '">' + escHtml(tok.t) + '</span>' : escHtml(tok.t)
        ).join('') + '\n';
      } else {
        tokensCache = null;
        $('#resaltatCodi').innerHTML = '';
      }
      sincronitzaResaltat();
    };
    if (immediat) fes();
    else resaltaTimer = setTimeout(fes, 70);
  }
  function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function sincronitzaResaltat() {
    const p = $('#resaltat');
    p.scrollTop = codi.scrollTop;
    p.scrollLeft = codi.scrollLeft;
  }

  function renderPos() {
    const p = codi.selectionStart;
    const abans = codi.value.slice(0, p);
    const ln = abans.split('\n').length;
    const col = p - abans.lastIndexOf('\n');
    $('#footPos').textContent = `Ln ${ln}, Col ${col}`;
  }

  let marcTimer = null;
  const SCRIPT_SYNC = '\n<script>(function(){var b=false;' +
    'window.addEventListener("message",function(e){if(!e.data||e.data.t!=="gSc")return;' +
    'b=true;var h=document.documentElement.scrollHeight-window.innerHeight;' +
    'window.scrollTo(0,e.data.p*Math.max(0,h));setTimeout(function(){b=false;},60);});' +
    'window.addEventListener("scroll",function(){if(b)return;' +
    'var h=document.documentElement.scrollHeight-window.innerHeight;' +
    'parent.postMessage({t:"gSc",p:h>0?window.scrollY/h:0},"*");},{passive:true});' +
    '})();<\/script>';
  function renderMarc(immediat) {
    clearTimeout(marcTimer);
    const fes = () => { $('#marc').srcdoc = codi.value + SCRIPT_SYNC; };
    if (immediat) fes();
    else if ($('#autoRender').checked) marcTimer = setTimeout(fes, 450);
  }

  // ── Edició: aplicar operacions del nucli al textarea ──
  let ultimTecleig = 0, restaurant = false;

  function histActual() {
    const d = actiu();
    if (!d) return null;
    if (!d.hist) d.hist = window.GE.creaHistorial(d.contingut, 0, 0);
    return d.hist;
  }

  function registraCanvi(fusiona) {
    const h = histActual();
    if (!h || restaurant) return;
    window.GE.registraHistorial(h, codi.value, codi.selectionStart, codi.selectionEnd, fusiona);
    actualitzaBotonsHist();
  }

  function actualitzaBotonsHist() {
    const h = histActual();
    $('#btnDesfes').disabled = !window.GE.potDesfer(h);
    $('#btnRefes').disabled = !window.GE.potRefer(h);
  }

  function restaura(estatHist) {
    if (!estatHist) return;
    restaurant = true;
    codi.value = estatHist.valor;
    codi.setSelectionRange(estatHist.selStart, estatHist.selEnd);
    const d = actiu();
    if (d) { d.contingut = codi.value; d.brut = true; }
    renderTabs(); renderCapcalera();
    renderNums(); renderPos(); renderResaltat(); renderMarc(); desaSessio();
    restaurant = false;
    actualitzaBotonsHist();
    codi.focus();
  }

  function desfes() { restaura(window.GE.desfesHistorial(histActual())); }
  function refes() { restaura(window.GE.refesHistorial(histActual())); }

  function aplica(r) {
    codi.value = r.valor;
    codi.selectionStart = r.selStart;
    codi.selectionEnd = r.selEnd;
    ultimTecleig = 0; // operació d'eina: talla la fusió de tecleig
    canviat();
    codi.focus();
  }
  function canviat() {
    const d = actiu();
    if (d) {
      d.contingut = codi.value;
      if (!d.brut) { d.brut = true; renderTabs(); renderCapcalera(); }
    }
    // coalescència: tecleig seguit (<700ms) es fusiona en un sol pas de desfer
    const ara = Date.now();
    registraCanvi(ara - ultimTecleig < 700);
    ultimTecleig = ara;
    renderNums(); renderPos(); renderResaltat(); renderMarc(); desaSessio();
  }

  // ── Barres d'eines ──
  function construeixEines() {
    const cars = $('#einesCars');
    window.GE.CARACTERS.forEach(([etq, text]) => {
      const b = document.createElement('button');
      b.className = 'eina';
      b.textContent = etq;
      b.title = 'Insereix ' + etq;
      b.addEventListener('click', () =>
        aplica(window.GE.insereixText(codi.value, codi.selectionStart, codi.selectionEnd, text)));
      cars.appendChild(b);
    });
    const wraps = $('#einesWrap');
    window.GE.WRAPS.forEach(([etq, obre, tanca]) => {
      const b = document.createElement('button');
      b.className = 'eina';
      b.textContent = etq;
      b.title = obre + '…' + tanca;
      b.addEventListener('click', () =>
        aplica(window.GE.embolcalla(codi.value, codi.selectionStart, codi.selectionEnd, obre, tanca)));
      wraps.appendChild(b);
    });
    const sel = $('#selSnippet');
    window.GE.SNIPPETS.forEach(([nom], i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = nom;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => {
      if (sel.value === '') return;
      const [nom, text] = window.GE.SNIPPETS[Number(sel.value)];
      sel.value = '';
      if (text === null) { // plantilla completa
        if (codi.value.trim() && !confirm('Substituir tot el contingut per la plantilla HTML5?')) return;
        const d = actiu();
        aplica({ valor: window.GE.plantillaBase(d ? d.nom.replace(/\.[^.]+$/, '') : 'Document'), selStart: 0, selEnd: 0 });
        return;
      }
      aplica(window.GE.insereixText(codi.value, codi.selectionStart, codi.selectionEnd, text));
    });
  }

  // ── Desar / Desar com ──
  async function desar(com) {
    const d = actiu();
    if (!d) return;
    d.contingut = codi.value;
    if (teFS) {
      try {
        if (com || !d.handle) {
          d.handle = await window.showSaveFilePicker({
            suggestedName: d.nom,
            types: [{ description: 'HTML', accept: { 'text/html': ['.html', '.htm'] } }]
          });
          d.nom = d.handle.name;
        }
        const w = await d.handle.createWritable();
        await w.write(d.contingut);
        await w.close();
        d.brut = false;
        renderTabs(); renderCapcalera(); desaSessio();
        toast(`«${d.nom}» desat al disc`);
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
        toast('No s\'ha pogut desar: ' + e.message, true);
        return;
      }
    }
    // Fallback: descàrrega
    const blob = new Blob([d.contingut], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = d.nom; a.click();
    URL.revokeObjectURL(url);
    d.brut = false;
    renderTabs(); renderCapcalera(); desaSessio();
    toast(`«${d.nom}» descarregat`);
  }

  async function obrirFitxers(files) {
    for (const f of files) {
      const text = await f.text();
      nouDocument(f.name, text);
      const d = actiu();
      d.brut = false;
    }
    renderTabs(); renderCapcalera();
    toast(files.length + ' fitxer(s) obert(s)');
  }

  // ── Divisor redimensionable ──
  function initDivisor() {
    const div = $('#divisor'), panell = $('#panellCodi');
    let arrossegant = false;
    div.addEventListener('pointerdown', e => {
      arrossegant = true; div.classList.add('actiu');
      div.setPointerCapture(e.pointerId);
    });
    div.addEventListener('pointermove', e => {
      if (!arrossegant) return;
      const taula = $('#taula').getBoundingClientRect();
      const pct = Math.min(85, Math.max(15, ((e.clientX - taula.left) / taula.width) * 100));
      panell.style.width = pct + '%';
    });
    div.addEventListener('pointerup', () => { arrossegant = false; div.classList.remove('actiu'); });
  }

  // ── Cerca i substitució ──
  const cercaEstat = { resultats: [], idx: -1 };

  function opcionsCerca() {
    return {
      regex: $('#qRegex').checked,
      paraulaSencera: $('#qParaula').checked,
      majuscules: $('#qMajus').checked,
      accents: $('#qAccents').checked
    };
  }

  function executaCerca(mantenIdx) {
    const q = $('#qCerca').value;
    const compte = $('#qCompte');
    if (!q) { cercaEstat.resultats = []; cercaEstat.idx = -1; compte.textContent = '—'; compte.className = 'compte'; return; }
    try {
      cercaEstat.resultats = window.GE.cercaText(codi.value, q, opcionsCerca());
    } catch (e) {
      compte.textContent = 'regex?'; compte.className = 'compte zero';
      cercaEstat.resultats = []; cercaEstat.idx = -1;
      return;
    }
    if (!cercaEstat.resultats.length) {
      cercaEstat.idx = -1;
      compte.textContent = '0 / 0'; compte.className = 'compte zero';
      return;
    }
    if (!mantenIdx || cercaEstat.idx >= cercaEstat.resultats.length) {
      // comença a la coincidència següent al cursor
      const p = codi.selectionStart;
      cercaEstat.idx = cercaEstat.resultats.findIndex(r => r.inici >= p);
      if (cercaEstat.idx < 0) cercaEstat.idx = 0;
    }
    mostraCoincidencia();
  }

  function mostraCoincidencia() {
    const r = cercaEstat.resultats[cercaEstat.idx];
    if (!r) return;
    codi.focus();
    codi.setSelectionRange(r.inici, r.fi);
    // scroll aproximat per línia
    const linia = codi.value.slice(0, r.inici).split('\n').length - 1;
    const total = codi.value.split('\n').length;
    codi.scrollTop = Math.max(0, (linia / Math.max(1, total)) * codi.scrollHeight - codi.clientHeight / 2);
    $('#nums').scrollTop = codi.scrollTop;
    const compte = $('#qCompte');
    compte.textContent = (cercaEstat.idx + 1) + ' / ' + cercaEstat.resultats.length;
    compte.className = 'compte';
    renderPos();
  }

  function navegaCerca(dir) {
    if (!cercaEstat.resultats.length) { executaCerca(); return; }
    cercaEstat.idx = (cercaEstat.idx + dir + cercaEstat.resultats.length) % cercaEstat.resultats.length;
    mostraCoincidencia();
  }

  function substituirUn() {
    if (cercaEstat.idx < 0 || !cercaEstat.resultats.length) { executaCerca(); return; }
    const r = cercaEstat.resultats[cercaEstat.idx];
    const res = window.GE.substitueixEn(codi.value, r, $('#qSubst').value);
    codi.value = res.valor;
    codi.setSelectionRange(r.inici, r.inici + $('#qSubst').value.length);
    canviat();
    executaCerca(true);
    if (cercaEstat.resultats.length) {
      // situa't a la coincidència següent des de la posició actual
      const p = codi.selectionStart;
      const seg = cercaEstat.resultats.findIndex(x => x.inici >= p);
      cercaEstat.idx = seg >= 0 ? seg : 0;
      mostraCoincidencia();
    }
  }

  function substituirTot() {
    executaCerca(true);
    if (!cercaEstat.resultats.length) { toast('Cap coincidència.', true); return; }
    const n = cercaEstat.resultats.length;
    codi.value = window.GE.substitueixTot(codi.value, cercaEstat.resultats, $('#qSubst').value);
    canviat();
    executaCerca();
    toast(n + ' substitució(ns) feta(es)');
  }

  function obreCerca() {
    $('#barraCerca').classList.add('oberta');
    const sel = codi.value.slice(codi.selectionStart, codi.selectionEnd);
    if (sel && sel.length < 80 && !sel.includes('\n')) $('#qCerca').value = sel;
    $('#qCerca').focus();
    $('#qCerca').select();
    executaCerca();
  }
  function tancaCerca() {
    $('#barraCerca').classList.remove('oberta');
    codi.focus();
  }

  // ── Sincronització d'scroll editor ↔ previsualització ──
  let syncBloq = false;
  function initSyncScroll() {
    codi.addEventListener('scroll', () => {
      $('#nums').scrollTop = codi.scrollTop;
      sincronitzaResaltat();
      if (!$('#syncScroll').checked || syncBloq) return;
      const h = codi.scrollHeight - codi.clientHeight;
      const p = h > 0 ? codi.scrollTop / h : 0;
      const marc = $('#marc');
      if (marc.contentWindow) marc.contentWindow.postMessage({ t: 'gSc', p }, '*');
    }, { passive: true });

    window.addEventListener('message', e => {
      if (!e.data || e.data.t !== 'gSc') return;
      if (!$('#syncScroll').checked) return;
      syncBloq = true;
      const h = codi.scrollHeight - codi.clientHeight;
      codi.scrollTop = e.data.p * Math.max(0, h);
      $('#nums').scrollTop = codi.scrollTop;
      setTimeout(() => { syncBloq = false; }, 60);
    });
  }

  // ── Hover tip: explica el codi sota el ratolí ──
  let ampladaChar = 0, tipTimer = null;
  function mesuraChar() {
    try {
      const cv = document.createElement('canvas').getContext('2d');
      const estil = getComputedStyle(codi);
      cv.font = estil.fontSize + ' ' + estil.fontFamily;
      ampladaChar = cv.measureText('XXXXXXXXXX').width / 10;
    } catch (e) { ampladaChar = 0; }
    if (!ampladaChar || !isFinite(ampladaChar)) {
      ampladaChar = parseFloat(getComputedStyle(codi).fontSize) * 0.6;
    }
  }

  function offsetDesDeCoords(x, y) {
    const r = codi.getBoundingClientRect();
    const estil = getComputedStyle(codi);
    const padL = parseFloat(estil.paddingLeft), padT = parseFloat(estil.paddingTop);
    const lh = parseFloat(estil.lineHeight);
    if (!ampladaChar) mesuraChar();
    const col = Math.floor((x - r.left - padL + codi.scrollLeft) / ampladaChar);
    const lin = Math.floor((y - r.top - padT + codi.scrollTop) / lh);
    if (lin < 0 || col < 0) return -1;
    const linies = codi.value.split('\n');
    if (lin >= linies.length) return -1;
    if (col >= linies[lin].length) return -1; // més enllà del final de línia
    let off = 0;
    for (let i = 0; i < lin; i++) off += linies[i].length + 1;
    return off + col;
  }

  function amagaTip() {
    $('#hovertip').classList.remove('vis');
  }

  function mostraTip(e) {
    if (!$('#chkTips').checked || !tokensCache) { amagaTip(); return; }
    const off = offsetDesDeCoords(e.clientX, e.clientY);
    if (off < 0) { amagaTip(); return; }
    const trobat = window.GE.tokenAOffset(tokensCache, off);
    const info = trobat ? window.GE.explicaToken(trobat.token) : null;
    if (!info) { amagaTip(); return; }
    const tip = $('#hovertip');
    $('#htTitol').textContent = info.titol;
    $('#htText').textContent = info.text;
    tip.classList.add('vis');
    const marge = 14;
    let tx = e.clientX + marge, ty = e.clientY + marge;
    const tr = tip.getBoundingClientRect();
    if (tx + tr.width > window.innerWidth - 8) tx = e.clientX - tr.width - marge;
    if (ty + tr.height > window.innerHeight - 8) ty = e.clientY - tr.height - marge;
    tip.style.left = tx + 'px';
    tip.style.top = ty + 'px';
  }

  function initHoverTip() {
    mesuraChar();
    codi.addEventListener('mousemove', e => {
      clearTimeout(tipTimer);
      tipTimer = setTimeout(() => mostraTip(e), 120);
    });
    codi.addEventListener('mouseleave', () => { clearTimeout(tipTimer); amagaTip(); });
    codi.addEventListener('input', amagaTip);
    codi.addEventListener('scroll', amagaTip, { passive: true });
    codi.addEventListener('keydown', amagaTip);
    $('#chkTips').addEventListener('change', amagaTip);
  }

  // ── Teclat ──
  function initTeclat() {
    codi.addEventListener('input', canviat);
    codi.addEventListener('click', renderPos);
    codi.addEventListener('keyup', renderPos);

    codi.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && !e.altKey && e.key.toLowerCase() === 'z') {
        e.preventDefault();
        if (e.shiftKey) refes(); else desfes();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && !e.altKey && e.key.toLowerCase() === 'y') {
        e.preventDefault();
        refes();
        return;
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        aplica(window.GE.tabulacio(codi.value, codi.selectionStart, codi.selectionEnd, e.shiftKey));
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const indent = window.GE.indentacioNovaLinia(codi.value, codi.selectionStart);
        aplica(window.GE.insereixText(codi.value, codi.selectionStart, codi.selectionEnd, '\n' + indent));
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'd') {
        e.preventDefault();
        aplica(window.GE.duplicaLinia(codi.value, codi.selectionStart));
      } else if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
        e.preventDefault();
        aplica(window.GE.mouLinia(codi.value, codi.selectionStart, codi.selectionEnd,
          e.key === 'ArrowUp' ? -1 : 1));
      } else if ((e.ctrlKey || e.metaKey) && e.key === '/') {
        e.preventDefault();
        aplica(window.GE.comentaHTML(codi.value, codi.selectionStart, codi.selectionEnd));
      } else if (e.key === '/' && codi.value[codi.selectionStart - 1] === '<' &&
        codi.selectionStart === codi.selectionEnd) {
        // autocompletar '</' amb l'última etiqueta oberta
        const nom = window.GE.ultimaEtiquetaOberta(codi.value, codi.selectionStart - 1);
        if (nom) {
          e.preventDefault();
          aplica(window.GE.insereixText(codi.value, codi.selectionStart, codi.selectionEnd,
            '/' + nom + '>'));
        }
      }
    });

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
        e.preventDefault();
        desar(e.shiftKey);
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
        e.preventDefault();
        obreCerca();
      } else if (e.key === 'F3') {
        e.preventDefault();
        navegaCerca(e.shiftKey ? -1 : 1);
      } else if (e.key === 'Escape' && $('#barraCerca').classList.contains('oberta')) {
        tancaCerca();
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'o') {
        e.preventDefault();
        $('#fileObrir').click();
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n' && e.altKey) {
        e.preventDefault();
        nouDocument();
      }
    });

    window.addEventListener('beforeunload', e => {
      const d = actiu();
      if (d) d.contingut = codi.value;
      if (estat.docs.some(x => x.brut)) { e.preventDefault(); e.returnValue = ''; }
    });
  }

  // ── Inicialització ──
  async function init() {
    db = await obreDB();
    await carregaSessio();
    if (!estat.docs.length) nouDocument();
    else activa(estat.actiuId);

    construeixEines();
    initDivisor();
    initTeclat();
    initSyncScroll();
    initHoverTip();

    $('#btnObreCerca').addEventListener('click', obreCerca);
    $('#qTanca').addEventListener('click', tancaCerca);
    $('#qCerca').addEventListener('input', () => executaCerca());
    $('#qCerca').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); navegaCerca(e.shiftKey ? -1 : 1); }
    });
    $('#qSubst').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); substituirUn(); }
    });
    ['qRegex', 'qParaula', 'qMajus', 'qAccents'].forEach(id =>
      $('#' + id).addEventListener('change', () => executaCerca()));
    $('#qPrev').addEventListener('click', () => navegaCerca(-1));
    $('#qNext').addEventListener('click', () => navegaCerca(1));
    $('#qSubstUn').addEventListener('click', substituirUn);
    $('#qSubstTot').addEventListener('click', substituirTot);

    // Controls de la segona iteració
    $('#btnDesfes').addEventListener('click', desfes);
    $('#btnRefes').addEventListener('click', refes);
    $('#chkColor').addEventListener('change', () => renderResaltat(true));
    let midaFont = 12.5;
    function aplicaFont() {
      [codi, $('#resaltat'), $('#nums')].forEach(el => el.style.fontSize = midaFont + 'px');
      mesuraChar();
      renderNums(); sincronitzaResaltat();
    }
    $('#btnFontMenys').addEventListener('click', () => { midaFont = Math.max(9, midaFont - 1); aplicaFont(); });
    $('#btnFontMes').addEventListener('click', () => { midaFont = Math.min(22, midaFont + 1); aplicaFont(); });

    $('#btnValida').addEventListener('click', () => {
      const errors = window.GE.validaEtiquetes(codi.value);
      if (!errors.length) { toast('✓ Cap etiqueta desaparellada'); return; }
      toast(`✗ ${errors.length} problema(es) · primer: ${errors[0].missatge}`, true);
      // situa el cursor a la línia del primer error
      const linies = codi.value.split('\n');
      let off = 0;
      for (let i = 0; i < errors[0].linia - 1; i++) off += linies[i].length + 1;
      codi.focus();
      codi.setSelectionRange(off, off + (linies[errors[0].linia - 1] || '').length);
      const total = linies.length;
      codi.scrollTop = Math.max(0, ((errors[0].linia - 1) / total) * codi.scrollHeight - codi.clientHeight / 2);
    });

    $('#btnFinestra').addEventListener('click', () => {
      const w = window.open('', '_blank');
      if (!w) { toast('El navegador ha bloquejat la finestra emergent.', true); return; }
      w.document.write(codi.value);
      w.document.close();
    });

    $('#btnObrir').addEventListener('click', () => $('#fileObrir').click());
    $('#fileObrir').addEventListener('change', e => {
      if (e.target.files.length) obrirFitxers([...e.target.files]);
      e.target.value = '';
    });
    $('#btnDesar').addEventListener('click', () => desar(false));
    $('#btnDesarCom').addEventListener('click', () => desar(true));
    $('#btnRefresca').addEventListener('click', () => renderMarc(true));
    $('#autoRender').addEventListener('change', () => renderMarc(true));

    // Arrossegar fitxers a l'editor per obrir-los
    document.body.addEventListener('dragover', e => e.preventDefault());
    document.body.addEventListener('drop', e => {
      e.preventDefault();
      if (e.dataTransfer.files.length) obrirFitxers([...e.dataTransfer.files]);
    });

    $('#footFS').textContent = teFS
      ? 'Desar directe al disc disponible (File System Access)'
      : 'Navegador sense File System Access: «Desar» descarrega el fitxer';

    renderMarc(true);
    renderResaltat(true);
    renderPos();
  }

  window.addEventListener('DOMContentLoaded', init);
})();
</script>
