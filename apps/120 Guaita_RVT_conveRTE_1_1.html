<body>
<div class="wrap">
    <header>
        <h1>Guaita RVT conveRTE</h1>
        <p>Canvia el tipus intern d'un fitxer Revit (projecte ⇄ plantilla) sense obrir Revit.</p>
    </header>
    <main>
        <label class="drop" id="drop">
            <input type="file" id="file-input" accept=".rvt,.rte">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <div class="drop-label">Arrossega el fitxer aquí, o <b>clica per seleccionar-lo</b></div>
            <div class="drop-exts"><span class="e-rvt">.rvt</span><span class="e-rte">.rte</span></div>
            <div class="drop-hint">El fitxer es processa localment al navegador — no s'envia enlloc</div>
        </label>

        <div id="result"></div>
    </main>
    <footer>
        <span>Presentació de Guaita RVT conveRTE</span>
        <span>SBS BIM Consulting 2026</span>
    </footer>
</div>

<script>
// =========================================================================
//  MOTOR: parser OLE2/CFBF (idèntic a Guaita Historial) + ruta d'escriptura
// =========================================================================
const NOSTREAM = 0xFFFFFFFF, ENDOFCHAIN = 0xFFFFFFFE, FREESECT = 0xFFFFFFFF;
const OLE_SIG = [0xD0, 0xCF, 0x11, 0xE0, 0xA1, 0xB1, 0x1A, 0xE1];

class CFB {
    constructor(arrayBuffer) {
        this.dv = new DataView(arrayBuffer);
        this.bytes = new Uint8Array(arrayBuffer);
        for (let i = 0; i < 8; i++)
            if (this.bytes[i] !== OLE_SIG[i]) throw new Error("No és un fitxer OLE2/CFBF vàlid.");
        this.sectorShift  = this.dv.getUint16(30, true);
        this.miniShift    = this.dv.getUint16(32, true);
        this.sectorSize   = 1 << this.sectorShift;
        this.miniSize     = 1 << this.miniShift;
        this.firstDir     = this.dv.getInt32(48, true);
        this.miniCutoff   = this.dv.getUint32(56, true);
        this.firstMiniFAT = this.dv.getInt32(60, true);
        this.firstDIFAT   = this.dv.getInt32(68, true);
        this.numDIFAT     = this.dv.getUint32(72, true);
        this._readDIFAT(); this._readFAT(); this._readDir();
        this._readMiniFAT(); this._readMiniStream();
    }
    _secOff(n) { return (n + 1) * this.sectorSize; }
    _sector(n) { const o = this._secOff(n); return this.bytes.subarray(o, o + this.sectorSize); }
    _readDIFAT() {
        this.difat = [];
        for (let i = 0; i < 109; i++) {
            const v = this.dv.getUint32(76 + i * 4, true);
            if (v !== FREESECT) this.difat.push(v);
        }
        let sec = this.firstDIFAT, n = this.numDIFAT, guard = 0;
        const perSec = this.sectorSize / 4;
        while (n > 0 && sec >= 0 && sec !== ENDOFCHAIN && guard++ < 1e5) {
            const base = this._secOff(sec);
            for (let i = 0; i < perSec - 1; i++) {
                const v = this.dv.getUint32(base + i * 4, true);
                if (v !== FREESECT) this.difat.push(v);
            }
            sec = this.dv.getUint32(base + (perSec - 1) * 4, true); n--;
        }
    }
    _readFAT() {
        const perSec = this.sectorSize / 4;
        this.fat = new Uint32Array(this.difat.length * perSec);
        let w = 0;
        for (const s of this.difat) {
            const base = this._secOff(s);
            for (let i = 0; i < perSec; i++) this.fat[w++] = this.dv.getUint32(base + i * 4, true);
        }
    }
    _chain(start) {
        const out = []; let s = start, guard = 0;
        while (s !== ENDOFCHAIN && s !== FREESECT && s >= 0 && s < this.fat.length && guard++ < 1e7) {
            out.push(s); s = this.fat[s];
        }
        return out;
    }
    _readChainBytes(start) {
        const secs = this._chain(start);
        const out = new Uint8Array(secs.length * this.sectorSize);
        secs.forEach((s, i) => out.set(this._sector(s), i * this.sectorSize));
        return out;
    }
    _readDir() {
        const dirBytes = this._readChainBytes(this.firstDir);
        const dv = new DataView(dirBytes.buffer, dirBytes.byteOffset, dirBytes.byteLength);
        const dec = new TextDecoder("utf-16le");
        this.dir = [];
        for (let off = 0; off + 128 <= dirBytes.length; off += 128) {
            const nameLen = dv.getUint16(off + 64, true);
            const type = dirBytes[off + 66];
            let name = "";
            if (nameLen >= 2) name = dec.decode(dirBytes.subarray(off, off + nameLen - 2));
            this.dir.push({
                name, type,
                left:  dv.getUint32(off + 68, true),
                right: dv.getUint32(off + 72, true),
                child: dv.getUint32(off + 76, true),
                start: dv.getUint32(off + 116, true),
                size:  dv.getUint32(off + 120, true) + dv.getUint32(off + 124, true) * 4294967296,
            });
        }
    }
    _readMiniFAT() {
        if (this.firstMiniFAT === ENDOFCHAIN || this.firstMiniFAT < 0) { this.minifat = new Uint32Array(0); return; }
        const b = this._readChainBytes(this.firstMiniFAT);
        this.minifat = new Uint32Array(b.buffer, b.byteOffset, Math.floor(b.byteLength / 4));
    }
    _readMiniStream() {
        const root = this.dir.find(e => e.type === 5);
        this.root = root;
        if (!root || root.start === ENDOFCHAIN) { this.miniStream = new Uint8Array(0); return; }
        this.miniStream = this._readChainBytes(root.start).subarray(0, root.size);
    }
    _readMiniChainBytes(start, size) {
        const out = new Uint8Array(Math.ceil(size / this.miniSize) * this.miniSize);
        let m = start, w = 0, guard = 0;
        while (m !== ENDOFCHAIN && m >= 0 && m < this.minifat.length && guard++ < 1e7) {
            const o = m * this.miniSize;
            out.set(this.miniStream.subarray(o, o + this.miniSize), w);
            w += this.miniSize; m = this.minifat[m];
        }
        return out.subarray(0, size);
    }
    readByName(name) {
        const e = this.dir.find(d => d.type === 2 && d.name === name);
        if (!e) return null;
        if (e.size >= this.miniCutoff) return this._readChainBytes(e.start).subarray(0, e.size);
        return this._readMiniChainBytes(e.start, e.size);
    }

    // ---- ruta d'escriptura: localitza l'offset físic real dins l'ArrayBuffer original ----
    _miniChain(start) {
        const out = []; let s = start, guard = 0;
        while (s !== ENDOFCHAIN && s !== FREESECT && s >= 0 && s < this.minifat.length && guard++ < 1e7) {
            out.push(s); s = this.minifat[s];
        }
        return out;
    }
    _physicalOffset(name, relOffset) {
        const e = this.dir.find(d => d.type === 2 && d.name === name);
        if (!e) throw new Error(`Stream "${name}" no trobat.`);
        if (e.size >= this.miniCutoff) {
            const chain = this._chain(e.start);
            const secIdx = Math.floor(relOffset / this.sectorSize);
            if (secIdx >= chain.length) throw new Error("Offset fora de rang del stream.");
            return this._secOff(chain[secIdx]) + (relOffset % this.sectorSize);
        } else {
            const miniChain = this._miniChain(e.start);
            const miniIdx = Math.floor(relOffset / this.miniSize);
            if (miniIdx >= miniChain.length) throw new Error("Offset fora de rang del mini-stream.");
            const posInRoot = miniChain[miniIdx] * this.miniSize + (relOffset % this.miniSize);
            const rootChain = this._chain(this.root.start);
            const secIdx = Math.floor(posInRoot / this.sectorSize);
            if (secIdx >= rootChain.length) throw new Error("Offset fora de rang de l'stream arrel.");
            return this._secOff(rootChain[secIdx]) + (posInRoot % this.sectorSize);
        }
    }
    writeBytes(name, relOffset, bytesArray) {
        for (let k = 0; k < bytesArray.length; k++) {
            const off = this._physicalOffset(name, relOffset + k);
            this.bytes[off] = bytesArray[k];
        }
    }
}

// =========================================================================
//  Detecció i patch del tipus de document.
//  Verificat per diff exhaustiu entre un .rvt i un .rte del mateix model:
//  tot el contingut d'elements (chunks gzip de Partitions) és idèntic bit a
//  bit; l'únic marcador de tipus de tot el fitxer és l'extensió guardada al
//  "Last Save Path" dins BasicFileInfo (hi apareix 2 cops, en UTF-16LE).
//  La conversió substitueix ".rvt" ⇄ ".rte" in-place (mateixa llargada,
//  4 bytes físics, sense tocar FAT ni comptadors d'historial).
// =========================================================================
function utf16(s) {
    const out = new Uint8Array(s.length * 2);
    for (let i = 0; i < s.length; i++) { out[i*2] = s.charCodeAt(i) & 0xff; out[i*2+1] = s.charCodeAt(i) >> 8; }
    return out;
}
function findAll(hay, needle) {
    const out = [];
    outer: for (let i = 0; i + needle.length <= hay.length; i++) {
        for (let j = 0; j < needle.length; j++) if (hay[i+j] !== needle[j]) continue outer;
        out.push(i);
    }
    return out;
}
function detectKind(cfb) {
    const bfi = cfb.readByName("BasicFileInfo");
    if (!bfi) return null;
    const occ = {};
    for (const ext of ['.rvt', '.rte', '.RVT', '.RTE']) {
        const hits = findAll(bfi, utf16(ext));
        if (hits.length) occ[ext.toLowerCase()] = (occ[ext.toLowerCase()] || []).concat(hits);
    }
    const hasRvt = !!occ['.rvt'], hasRte = !!occ['.rte'];
    if (hasRvt === hasRte) return null; // cap ocurrència o barreja inconsistent
    return { kind: hasRvt ? 1 : 2, occ };
}
function applyKindPatch(cfb, target) {
    const bfi = cfb.readByName("BasicFileInfo");
    const from = target === 1 ? '.rte' : '.rvt';
    const to   = target === 1 ? '.rvt' : '.rte';
    let patched = 0;
    for (const [f, t] of [[from, to], [from.toUpperCase(), to.toUpperCase()]]) {
        for (const off of findAll(bfi, utf16(f))) {
            cfb.writeBytes("BasicFileInfo", off, utf16(t));
            patched++;
        }
    }
    if (!patched) throw new Error("Cap ocurrència de l'extensió trobada dins BasicFileInfo.");
    return patched;
}

// =========================================================================
//  UI
// =========================================================================
const dropEl = document.getElementById('drop');
const inputEl = document.getElementById('file-input');
const resultEl = document.getElementById('result');

['dragover','dragenter'].forEach(ev => dropEl.addEventListener(ev, e => { e.preventDefault(); dropEl.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dropEl.addEventListener(ev, e => { dropEl.classList.remove('drag'); }));
dropEl.addEventListener('drop', e => {
    e.preventDefault();
    if (e.dataTransfer.files.length) { inputEl.files = e.dataTransfer.files; handleFile(e.dataTransfer.files[0]); }
});
inputEl.addEventListener('change', () => { if (inputEl.files.length) handleFile(inputEl.files[0]); });

function fmtSize(b) { return (b / (1024*1024)).toFixed(1) + ' MB'; }

async function handleFile(file) {
    resultEl.innerHTML = '';
    let buf;
    try {
        buf = await file.arrayBuffer();
    } catch (e) {
        resultEl.innerHTML = `<div class="err">No s'ha pogut llegir el fitxer: ${e.message}</div>`;
        return;
    }

    let cfb, det;
    try {
        cfb = new CFB(buf);
        det = detectKind(cfb);
    } catch (e) {
        resultEl.innerHTML = `<div class="err">${e.message}</div>`;
        return;
    }
    if (!det) {
        resultEl.innerHTML = `<div class="err">No s'ha pogut determinar el tipus: cap extensió (o extensions contradictòries) dins el Last Save Path de BasicFileInfo.</div>`;
        return;
    }

    const kindNow = det.kind;               // 1 = projecte (rvt), 2 = plantilla (rte)
    const kindTarget = kindNow === 1 ? 2 : 1;
    const badgeNow = kindNow === 1 ? '<span class="badge rvt">PROJECTE · RVT</span>' : '<span class="badge rte">PLANTILLA · RTE</span>';
    const badgeTarget = kindTarget === 1 ? '<span class="badge rvt">PROJECTE · RVT</span>' : '<span class="badge rte">PLANTILLA · RTE</span>';
    const baseName = file.name.replace(/\.(rvt|rte)$/i, '');
    const targetExt = kindTarget === 1 ? '.rvt' : '.rte';
    const actionLabel = kindTarget === 1 ? 'Converteix a projecte (.rvt)' : 'Converteix a plantilla (.rte)';

    resultEl.innerHTML = `
        <div class="card">
            <div class="details mono">
                Mida: ${fmtSize(file.size)}<br>
                Tipus detectat pel Last Save Path (BasicFileInfo): "${det.kind === 1 ? '.rvt' : '.rte'}" a offsets ${(det.occ[det.kind === 1 ? '.rvt' : '.rte']).join(', ')}
            </div>
        </div>
        <div class="preview">
            <div class="pv-side pv-from">
                <div class="pv-name mono">${file.name}</div>
                ${badgeNow}
            </div>
            <div class="pv-arrow">→</div>
            <div class="pv-side pv-to">
                <div class="pv-edit">
                    <input type="text" id="out-base" class="mono" value="${baseName.replace(/"/g,'&quot;')}" spellcheck="false">
                    <span class="pv-ext mono">${targetExt}</span>
                </div>
                ${badgeTarget}
            </div>
        </div>
        <div class="warn">
            Eina experimental  amb objectius exclusivament educatius. El patch substitueix l'extensió dins el Last Save Path de <span class="mono">BasicFileInfo</span> (4 bytes), sense tocar l'historial ni cap comptador i canvia l'extensió — És necessari verificar sempre el resultat obrint-lo a Revit.
        </div>
        <button class="convert" id="btn-convert"></button>
        <div id="convert-status"></div>
    `;

    const baseInput = document.getElementById('out-base');
    const btn = document.getElementById('btn-convert');
    const outName = () => (baseInput.value.trim() || baseName) + targetExt;
    const refreshBtn = () => { btn.textContent = `${actionLabel} → ${outName()}`; };
    baseInput.addEventListener('input', refreshBtn);
    refreshBtn();

    btn.addEventListener('click', () => doConvert(buf, kindTarget, outName()));
}

function doConvert(buf, targetKind, outName) {
    const statusEl = document.getElementById('convert-status');
    const btn = document.getElementById('btn-convert');
    btn.disabled = true;
    try {
        const cfb = new CFB(buf);
        applyKindPatch(cfb, targetKind);

        // verificació en fred: rellegim l'estructura sobre el mateix buffer mutat
        const check = new CFB(buf);
        const det2 = detectKind(check);
        if (!det2 || det2.kind !== targetKind) {
            throw new Error('La verificació posterior al patch ha fallat: el flag no s\'ha actualitzat correctament.');
        }

        const blob = new Blob([buf], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = outName;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);

        statusEl.innerHTML = `<div class="ok">Fet — descarregat com <b>${outName}</b>. El flag de tipus s'ha verificat després del patch.</div>`;
    } catch (e) {
        statusEl.innerHTML = `<div class="err">${e.message}</div>`;
    } finally {
        btn.disabled = false;
    }
}
</script>

</style>
<script>
(function(){var K='gtema-converte';
function ap(t){document.documentElement.setAttribute('data-gtema',t);
var b=document.getElementById('gtemaFab');
if(b){b.textContent=t==='fosc'?'\u2600':'\ud83c\udf19';b.title=t==='fosc'?'Canvia a mode clar':'Canvia a mode fosc';}
try{localStorage.setItem(K,t)}catch(e){}}
var b=document.createElement('button');b.id='gtemaFab';document.body.appendChild(b);
b.onclick=function(){ap(document.documentElement.getAttribute('data-gtema')==='fosc'?'clar':'fosc')};
var t;try{t=localStorage.getItem(K)}catch(e){}
ap(t==='clar'?'clar':'fosc');
})();
</script>
