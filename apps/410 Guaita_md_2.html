<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guaita .md</title>
<style>
  :root{
    --ui: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    --prose: Charter, "Bitstream Charter", "Sitka Text", Georgia, Cambria, "Times New Roman", serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --r: 7px;
    --tab-h: 30px;
  }
  html[data-theme="light"]{
    --shell:#e8e5dd; --shell-2:#ddd9cf; --canvas:#fcfbf8; --editor:#f7f5f0;
    --ink:#20242a; --ink-soft:#646a72; --ink-faint:#9a9f98;
    --line:#d7d3c8; --line-2:#cac6ba;
    --accent:#0e7c6f; --accent-2:#0b5f55; --accent-ink:#ffffff;
    --code-bg:#efece5; --code-ink:#2c3b3a; --quote-bar:#c8c3b6;
    --sel:rgba(14,124,111,.16); --beacon:#e0a226;
    --shadow:0 1px 2px rgba(40,38,30,.06), 0 8px 24px rgba(40,38,30,.07);
  }
  html[data-theme="dark"]{
    --shell:#13171b; --shell-2:#1a1f24; --canvas:#1b2127; --editor:#161b20;
    --ink:#e7e8e3; --ink-soft:#9aa0a6; --ink-faint:#666d73;
    --line:#2a3138; --line-2:#333b43;
    --accent:#2db5a4; --accent-2:#36c7b5; --accent-ink:#0a0e10;
    --code-bg:#11161a; --code-ink:#bcd6d1; --quote-bar:#39424a;
    --sel:rgba(45,181,164,.22); --beacon:#e6b13e;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:var(--ui); color:var(--ink);
    background:var(--shell); overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--sel)}
  .app{display:grid; grid-template-rows:auto 1fr auto; height:100vh}

  /* ---------- topbar ---------- */
  .topbar{
    display:flex; align-items:stretch; gap:6px;
    background:var(--shell); border-bottom:1px solid var(--line);
    padding:0 8px; height:46px;
  }
  .brand{display:flex; align-items:center; gap:9px; padding:0 8px 0 4px; flex:0 0 auto}
  .brand svg{display:block}
  .brand .name{font-weight:650; font-size:14.5px; letter-spacing:-.2px}
  .brand .name span{color:var(--accent)}
  .brand .dot{color:var(--ink-faint); font-weight:400}

  .tabs{
    display:flex; align-items:flex-end; gap:3px; flex:1 1 auto;
    overflow-x:auto; overflow-y:hidden; padding:0 4px; min-width:0;
    scrollbar-width:thin;
  }
  .tabs::-webkit-scrollbar{height:5px}
  .tabs::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:3px}
  .tab{
    flex:0 0 auto; display:flex; align-items:center; gap:7px;
    max-width:200px; height:var(--tab-h); padding:0 7px 0 11px;
    margin-bottom:6px; border:1px solid transparent; border-radius:var(--r);
    background:transparent; color:var(--ink-soft); font-size:12.5px;
    cursor:pointer; user-select:none; transition:background .12s,color .12s;
  }
  .tab:hover{background:var(--shell-2); color:var(--ink)}
  .tab.active{background:var(--canvas); color:var(--ink); border-color:var(--line); box-shadow:0 1px 0 var(--canvas)}
  .tab .lbl{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .tab .mod{color:var(--accent); font-size:16px; line-height:0; margin-right:-2px}
  .tab .x{
    display:inline-flex; align-items:center; justify-content:center;
    width:16px; height:16px; border-radius:4px; font-size:13px; color:var(--ink-faint);
    flex:0 0 auto; opacity:.55;
  }
  .tab:hover .x{opacity:1}
  .tab .x:hover{background:var(--line-2); color:var(--ink)}
  .tab.dragging{opacity:.45}
  .tab.drop-before{box-shadow:inset 2px 0 0 var(--accent)}
  .tab.drop-after{box-shadow:inset -2px 0 0 var(--accent)}
  .tab-add{
    flex:0 0 auto; width:24px; height:var(--tab-h); margin-bottom:6px; padding:0;
    display:inline-flex; align-items:center; justify-content:center;
    border:0; border-radius:var(--r); background:transparent; cursor:pointer;
    color:var(--ink-faint); font-size:17px; line-height:0; transition:background .12s,color .12s;
  }
  .tab-add:hover{background:var(--shell-2); color:var(--ink)}

  .menu-wrap{position:relative; display:inline-flex}
  .menu{
    position:absolute; top:38px; right:0; z-index:60; min-width:204px;
    background:var(--canvas); border:1px solid var(--line); border-radius:9px;
    box-shadow:var(--shadow); padding:5px; display:none;
  }
  .menu.show{display:block}
  .menu .mtitle{padding:6px 10px 5px; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint); font-weight:650}
  .menu button{
    display:flex; align-items:center; gap:10px; width:100%; padding:8px 10px;
    border:0; background:transparent; color:var(--ink); font:inherit; font-size:13px;
    border-radius:6px; cursor:pointer; text-align:left;
  }
  .menu button:hover{background:var(--shell-2)}
  .menu button svg{color:var(--ink-soft); flex:0 0 auto}

  .actions{display:flex; align-items:center; gap:2px; flex:0 0 auto; padding-left:4px}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    height:32px; min-width:32px; padding:0 8px; border:1px solid transparent;
    border-radius:var(--r); background:transparent; color:var(--ink-soft);
    font:inherit; font-size:13px; cursor:pointer; transition:background .12s,color .12s,border-color .12s;
  }
  .btn:hover{background:var(--shell-2); color:var(--ink)}
  .btn.on{background:var(--accent); color:var(--accent-ink); border-color:var(--accent)}
  .btn.on:hover{background:var(--accent-2)}
  .btn svg{display:block}
  .btn.primary{background:var(--accent); color:var(--accent-ink); border-color:var(--accent); padding:0 12px; font-weight:550}
  .btn.primary:hover{background:var(--accent-2)}
  .sep{width:1px; align-self:center; height:20px; background:var(--line); margin:0 4px}

  /* ---------- main ---------- */
  .main{display:flex; min-height:0; overflow:hidden}
  .outline{
    flex:0 0 240px; background:var(--shell); border-right:1px solid var(--line);
    overflow:auto; padding:14px 6px 24px; display:none;
  }
  .main.show-outline .outline{display:block}
  .outline h6{
    margin:2px 10px 10px; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-faint); font-weight:650;
  }
  .outline a{
    display:block; padding:4px 10px; border-radius:5px; font-size:12.5px;
    color:var(--ink-soft); text-decoration:none; line-height:1.35;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer;
  }
  .outline a:hover{background:var(--shell-2); color:var(--ink)}
  .outline a.lvl-1{font-weight:600; color:var(--ink)}
  .outline a.lvl-2{padding-left:20px}
  .outline a.lvl-3{padding-left:32px; font-size:12px}
  .outline a.lvl-4,.outline a.lvl-5,.outline a.lvl-6{padding-left:44px; font-size:11.5px; color:var(--ink-faint)}
  .outline .empty{padding:8px 12px; font-size:12px; color:var(--ink-faint); font-style:italic}

  .workspace{flex:1 1 auto; display:flex; min-width:0; min-height:0; --split:58%}
  .pane{min-width:0; min-height:0; overflow:auto; position:relative}
  .preview-pane{flex:1 1 auto; background:var(--canvas)}
  .workspace.split .preview-pane{flex:0 0 var(--split)}
  .editor-pane{display:none; flex:1 1 auto; background:var(--editor); border-left:0}
  .workspace.split .editor-pane{display:block}

  .divider{display:none; flex:0 0 7px; background:var(--shell); cursor:col-resize; position:relative}
  .workspace.split .divider{display:block}
  .divider::after{content:""; position:absolute; inset:0 3px; background:var(--line); border-radius:2px; transition:background .12s}
  .divider:hover::after,.divider.drag::after{background:var(--accent)}

  .preview-wrap{max-width:760px; margin:0 auto; padding:40px 48px 120px}
  .editor{
    width:100%; height:100%; border:0; outline:0; resize:none; display:block;
    background:transparent; color:var(--ink); font-family:var(--mono);
    font-size:13.5px; line-height:1.7; padding:24px 26px 120px; tab-size:2;
  }
  .editor-pane .ed-head{
    position:sticky; top:0; z-index:2; display:flex; align-items:center; gap:8px;
    padding:8px 26px; font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink-faint); background:var(--editor); border-bottom:1px solid var(--line);
  }
  .editor-pane .ed-head b{color:var(--accent); font-weight:650; letter-spacing:0; text-transform:none; font-size:12px}

  /* ---------- empty state ---------- */
  .empty-state{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; text-align:center; padding:24px;
  }
  .empty-state .glyph{opacity:.9}
  .empty-state h2{margin:0; font-size:18px; font-weight:600; letter-spacing:-.2px}
  .empty-state p{margin:0; color:var(--ink-soft); font-size:13.5px; max-width:360px; line-height:1.55}
  .empty-state kbd{
    font-family:var(--mono); font-size:11px; padding:1px 6px; border:1px solid var(--line-2);
    border-bottom-width:2px; border-radius:5px; background:var(--shell-2); color:var(--ink-soft);
  }

  /* ---------- drop overlay ---------- */
  .drop{
    position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    background:color-mix(in srgb, var(--accent) 14%, transparent); backdrop-filter:blur(1px);
  }
  .drop.show{display:flex}
  .drop .box{
    border:2px dashed var(--accent); border-radius:14px; padding:38px 56px;
    background:var(--canvas); color:var(--accent); font-size:15px; font-weight:600;
    box-shadow:var(--shadow);
  }

  /* ---------- statusbar ---------- */
  .statusbar{
    display:flex; align-items:center; gap:16px; height:26px; padding:0 14px;
    background:var(--shell); border-top:1px solid var(--line);
    font-size:11.5px; color:var(--ink-faint);
  }
  .statusbar .grow{flex:1}
  .statusbar b{color:var(--ink-soft); font-weight:550}
  .statusbar .pill{color:var(--accent); font-weight:600}

  /* ---------- markdown body ---------- */
  .markdown-body{font-family:var(--prose); font-size:17px; line-height:1.72; color:var(--ink); word-wrap:break-word}
  .markdown-body>:first-child{margin-top:0}
  .markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6{
    font-family:var(--ui); line-height:1.25; margin:1.7em 0 .6em; font-weight:680; letter-spacing:-.01em; scroll-margin-top:16px;
  }
  .markdown-body h1{font-size:1.92em; margin-top:0; padding-bottom:.32em; border-bottom:1px solid var(--line)}
  .markdown-body h2{font-size:1.5em; padding-bottom:.28em; border-bottom:1px solid var(--line)}
  .markdown-body h3{font-size:1.24em}
  .markdown-body h4{font-size:1.06em}
  .markdown-body h5{font-size:.95em; color:var(--ink-soft)}
  .markdown-body h6{font-size:.88em; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.05em}
  .markdown-body p{margin:0 0 1.05em}
  .markdown-body a{color:var(--accent); text-decoration:none; border-bottom:1px solid color-mix(in srgb, var(--accent) 40%, transparent)}
  .markdown-body a:hover{border-bottom-color:var(--accent)}
  .markdown-body strong{font-weight:680}
  .markdown-body ul,.markdown-body ol{margin:0 0 1.05em; padding-left:1.6em}
  .markdown-body li{margin:.3em 0}
  .markdown-body li>ul,.markdown-body li>ol{margin:.3em 0}
  .markdown-body blockquote{
    margin:0 0 1.05em; padding:.2em 1.1em; color:var(--ink-soft);
    border-left:3px solid var(--quote-bar); font-style:italic;
  }
  .markdown-body blockquote p{margin:.5em 0}
  .markdown-body code{
    font-family:var(--mono); font-size:.86em; background:var(--code-bg); color:var(--code-ink);
    padding:.16em .42em; border-radius:5px;
  }
  .markdown-body pre{
    background:var(--code-bg); border:1px solid var(--line); border-radius:var(--r);
    padding:14px 16px; overflow:auto; margin:0 0 1.1em; line-height:1.55;
  }
  .markdown-body pre code{background:none; color:var(--code-ink); padding:0; font-size:13.5px}
  .markdown-body hr{border:0; border-top:1px solid var(--line); margin:2em 0}
  .markdown-body img{max-width:100%; border-radius:var(--r)}
  .markdown-body table{border-collapse:collapse; margin:0 0 1.1em; font-size:.92em; font-family:var(--ui); display:block; overflow:auto}
  .markdown-body th,.markdown-body td{border:1px solid var(--line); padding:7px 12px; text-align:left}
  .markdown-body th{background:var(--code-bg); font-weight:650}
  .markdown-body tr:nth-child(2n) td{background:color-mix(in srgb, var(--code-bg) 45%, transparent)}
  .markdown-body input[type=checkbox]{margin-right:.5em; vertical-align:middle}
  .markdown-body kbd{font-family:var(--mono); font-size:.82em; padding:1px 5px; border:1px solid var(--line-2); border-radius:4px; background:var(--code-bg)}

  /* scrollbars */
  .pane::-webkit-scrollbar,.outline::-webkit-scrollbar{width:11px; height:11px}
  .pane::-webkit-scrollbar-thumb,.outline::-webkit-scrollbar-thumb{
    background:var(--line-2); border-radius:6px; border:3px solid var(--canvas);
  }
  .outline::-webkit-scrollbar-thumb{border-color:var(--shell)}
  .editor-pane::-webkit-scrollbar-thumb{border-color:var(--editor)}

  #printArea{display:none}
  #printArea .pa-meta{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--ui); font-size:10.5px; letter-spacing:.02em;
    color:#777; border-bottom:1px solid #ddd; padding-bottom:7px; margin-bottom:20px;
  }
  #printArea .code-print .ln{display:flex; gap:14px; break-inside:avoid; page-break-inside:avoid}
  #printArea .code-print .n{
    flex:0 0 auto; min-width:2.4em; text-align:right; color:#aaa;
    font-family:var(--mono); font-size:10.5px; line-height:1.6; user-select:none;
  }
  #printArea .code-print .t{
    white-space:pre-wrap; word-break:break-word; font-family:var(--mono);
    font-size:11px; line-height:1.6; color:#222;
  }
  @media print{
    html,body{background:#fff !important; overflow:visible !important; height:auto !important}
    .app,.drop,.menu,#fileInput{display:none !important}
    #printArea{
      display:block !important;
      --ink:#1a1a1a; --ink-soft:#555; --ink-faint:#888;
      --line:#dcdcdc; --line-2:#cfcfcf; --code-bg:#f5f4f0; --code-ink:#33403e; --quote-bar:#ccc;
    }
    #printArea .markdown-body{font-size:12pt; line-height:1.55}
    #printArea .markdown-body a{color:#1a1a1a; border:0}
    #printArea .markdown-body pre,#printArea .markdown-body table{break-inside:avoid}
    #printArea .markdown-body h1,#printArea .markdown-body h2,#printArea .markdown-body h3{break-after:avoid}
    @page{margin:18mm 16mm}
  }

  .hide{display:none !important}

  @media (max-width:820px){
    .brand .name{display:none}
    .preview-wrap{padding:26px 20px 100px}
    .workspace.split{flex-direction:column}
    .workspace.split .preview-pane{flex:0 0 var(--split-v,50%)}
    .workspace.split .divider{flex:0 0 7px; cursor:row-resize}
    .workspace.split .divider::after{inset:3px 0}
    .outline{position:absolute; z-index:30; height:100%; box-shadow:var(--shadow)}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand" title="Guaita .md">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="3.2" r="1.7" fill="var(--beacon)"/>
        <path d="M7 8 h10 l-1.4 11 h-7.2 Z" fill="none" stroke="var(--accent)" stroke-width="1.7" stroke-linejoin="round"/>
        <path d="M9 8 v11 M15 8 v11 M8.1 13 h7.8" stroke="var(--accent)" stroke-width="1.2" opacity=".55"/>
        <path d="M6 8 h12" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
      <div class="name">Guaita<span>.</span>md</div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="actions">
      <button class="btn" id="openBtn" title="Obre fitxers .md">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2"/><path d="M3.5 19 6 11h15l-2.5 8Z"/></svg>
        <span class="lbl-open">Obre</span>
      </button>
      <div class="sep"></div>
      <button class="btn" id="outlineBtn" title="Esquema (índex)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg>
      </button>
      <button class="btn" id="codeBtn" title="Mostra/amaga el codi (Ctrl+E)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 8 4 12l4 4M16 8l4 4-4 4"/></svg>
      </button>
      <button class="btn" id="downloadBtn" title="Desa el fitxer actiu (.md)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      </button>
      <div class="menu-wrap">
        <button class="btn" id="printBtn" title="Imprimeix (Ctrl+P)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6M6 18H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-1M7 14h10v7H7z"/></svg>
        </button>
        <div class="menu" id="printMenu">
          <div class="mtitle">Imprimeix</div>
          <button id="printFmt"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 10h16M4 15h10M4 20h7"/></svg>Formatat (preview)</button>
          <button id="printCode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 8 4 12l4 4M16 8l4 4-4 4"/></svg>Codi font</button>
        </div>
      </div>
      <div class="sep"></div>
      <button class="btn" id="themeBtn" title="Tema clar/fosc">
        <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></svg>
      </button>
    </div>
  </div>

  <div class="main" id="main">
    <aside class="outline" id="outline"></aside>
    <div class="workspace" id="workspace">
      <div class="pane preview-pane" id="previewPane">
        <div class="preview-wrap"><div class="markdown-body" id="preview"></div></div>
        <div class="empty-state" id="emptyState">
          <div class="glyph">
            <svg width="58" height="58" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="3.2" r="1.6" fill="var(--beacon)"/>
              <path d="M7 8 h10 l-1.4 11 h-7.2 Z" fill="none" stroke="var(--ink-faint)" stroke-width="1.4" stroke-linejoin="round"/>
              <path d="M9 8 v11 M15 8 v11 M8.1 13 h7.8" stroke="var(--ink-faint)" stroke-width="1" opacity=".6"/>
              <path d="M6 8 h12" stroke="var(--ink-faint)" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </div>
          <h2>Cap fitxer obert</h2>
          <p>Arrossega fitxers <b>.md</b> aquí, o prem <kbd>Obre</kbd>. Pots obrir-ne diversos alhora; cadascun en una pestanya.</p>
          <button class="btn primary" id="emptyOpenBtn">Obre fitxers .md</button>
        </div>
      </div>
      <div class="divider" id="divider"></div>
      <div class="pane editor-pane" id="editorPane">
        <div class="ed-head"><b>Codi</b> · edita i el preview s'actualitza al moment</div>
        <textarea class="editor" id="editor" spellcheck="false" placeholder="# Escriu markdown aquí…"></textarea>
      </div>
    </div>
  </div>

  <div class="statusbar">
    <span id="stFile">—</span>
    <span class="grow"></span>
    <span id="stCounts"></span>
    <span class="pill" id="stMode">Vista</span>
  </div>
</div>

<input type="file" id="fileInput" accept=".md,.markdown,.mdown,.mkd,.txt,text/markdown" multiple class="hide">

  var ICON_MOON='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>';

  var tabs=[], activeId=null, uid=0, showCode=false, dragSrcId=null;
  var $=function(id){return document.getElementById(id)};
  var preview=$('preview'), editor=$('editor'), tabsEl=$('tabs'),
      workspace=$('workspace'), mainEl=$('main'), outlineEl=$('outline'),
      emptyState=$('emptyState'), drop=$('drop');

  function activeTab(){ return tabs.find(function(t){return t.id===activeId}) || null; }
  function esc(s){ return s.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]}); }

  /* ---- file loading ---- */
  function openFiles(fileList){
    var arr=Array.prototype.slice.call(fileList||[]);
    if(!arr.length) return;
    var firstNew=null;
    var pending=arr.length;
    arr.forEach(function(file){
      var r=new FileReader();
      r.onload=function(){
        var t={ id:++uid, name:file.name, content:String(r.result||''), saved:String(r.result||'') };
        tabs.push(t); if(firstNew===null) firstNew=t.id;
        if(--pending===0){ if(firstNew!==null) selectTab(firstNew); renderTabs(); }
      };
      r.onerror=function(){ if(--pending===0){ if(firstNew!==null) selectTab(firstNew); renderTabs(); } };
      r.readAsText(file);
    });
  }

  /* ---- tabs ---- */
  function renderTabs(){
    tabsEl.innerHTML='';
    tabs.forEach(function(t){
      var el=document.createElement('div');
      el.className='tab'+(t.id===activeId?' active':'');
      el.title=t.name+'  ·  doble clic per reanomenar';
      el.draggable=true;
      var dirty=t.content!==t.saved;
      el.innerHTML=(dirty?'<span class="mod">•</span>':'')+'<span class="lbl">'+esc(t.name)+'</span><span class="x" title="Tanca">&times;</span>';
      el.querySelector('.lbl').addEventListener('click',function(){selectTab(t.id)});
      if(el.querySelector('.mod')) el.querySelector('.mod').addEventListener('click',function(){selectTab(t.id)});
      el.querySelector('.x').addEventListener('click',function(e){e.stopPropagation(); closeTab(t.id)});
      el.addEventListener('dblclick',function(){ renameTab(t.id); });
      el.addEventListener('mousedown',function(e){ if(e.button===1) e.preventDefault(); });
      el.addEventListener('auxclick',function(e){ if(e.button===1){ e.preventDefault(); closeTab(t.id); } });
      el.addEventListener('dragstart',function(e){ dragSrcId=t.id; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','');}catch(_){} });
      el.addEventListener('dragend',function(){ dragSrcId=null; el.classList.remove('dragging'); clearDropMarks(); });
      el.addEventListener('dragover',function(e){
        if(dragSrcId==null) return; e.preventDefault(); clearDropMarks();
        var before=e.clientX < el.getBoundingClientRect().left+el.offsetWidth/2;
        el.classList.add(before?'drop-before':'drop-after');
      });
      el.addEventListener('drop',function(e){
        if(dragSrcId==null) return; e.preventDefault(); e.stopPropagation();
        var before=e.clientX < el.getBoundingClientRect().left+el.offsetWidth/2;
        reorderTab(dragSrcId, t.id, before);
      });
      tabsEl.appendChild(el);
    });
    var add=document.createElement('button');
    add.className='tab-add'; add.title='Nou document'; add.textContent='+';
    add.addEventListener('click',newDoc);
    tabsEl.appendChild(add);
  }

  function clearDropMarks(){
    Array.prototype.forEach.call(tabsEl.querySelectorAll('.tab'),function(el){ el.classList.remove('drop-before','drop-after'); });
  }
  function reorderTab(srcId, targetId, before){
    if(srcId==null || srcId===targetId) return;
    var si=tabs.findIndex(function(t){return t.id===srcId}); if(si<0) return;
    var moved=tabs.splice(si,1)[0];
    var ti=tabs.findIndex(function(t){return t.id===targetId});
    if(ti<0){ tabs.push(moved); } else { tabs.splice(before?ti:ti+1,0,moved); }
    renderTabs();
  }
  function uniqueName(base){
    var name=base, stem=base.replace(/\.md$/,''), i=1;
    while(tabs.some(function(t){return t.name===name})){ name=stem+'-'+(++i)+'.md'; }
    return name;
  }
  function newDoc(){
    var t={ id:++uid, name:uniqueName('sense-nom.md'), content:'', saved:'' };
    tabs.push(t); selectTab(t.id);
    if(!showCode){ toggleCode(); } else { editor.focus(); }
  }
  function renameTab(id){
    var t=tabs.find(function(x){return x.id===id}); if(!t) return;
    var n=prompt('Nom del fitxer:', t.name);
    if(n && n.trim()){ t.name=n.trim(); renderTabs(); updateUI(); }
  }

  function selectTab(id){
    activeId=id; var t=activeTab();
    editor.value = t? t.content : '';
    render();
    renderTabs();
    updateUI();
    var act=tabsEl.querySelector('.tab.active'); if(act) act.scrollIntoView({block:'nearest',inline:'nearest'});
  }

  function closeTab(id){
    var i=tabs.findIndex(function(t){return t.id===id});
    if(i<0) return;
    var t=tabs[i];
    if(t.content!==t.saved && !confirm('"'+t.name+'" té canvis sense desar. Tancar igualment?')) return;
    tabs.splice(i,1);
    if(activeId===id){ activeId = tabs.length ? tabs[Math.max(0,i-1)].id : null; }
    if(activeId){ selectTab(activeId); } else { editor.value=''; render(); renderTabs(); updateUI(); }
  }

  /* ---- render preview + outline ---- */
  function render(){
    var t=activeTab();
    emptyState.classList.toggle('hide', !!t);
    if(!t){ preview.innerHTML=''; buildOutline(); return; }
    preview.innerHTML = marked.parse(t.content);
    var hs=preview.querySelectorAll('h1,h2,h3,h4,h5,h6');
    hs.forEach(function(h,i){ if(!h.id) h.id='h-'+i; });
    buildOutline(hs);
    counts(t.content);
  }

  function buildOutline(hs){
    if(!mainEl.classList.contains('show-outline')) return;
    outlineEl.innerHTML='<h6>Esquema</h6>';
    if(!hs || !hs.length){ outlineEl.insertAdjacentHTML('beforeend','<div class="empty">Sense encapçalaments</div>'); return; }
    hs.forEach(function(h){
      var lvl=+h.tagName[1];
      var a=document.createElement('a');
      a.className='lvl-'+lvl; a.textContent=h.textContent;
      a.addEventListener('click',function(){ h.scrollIntoView({behavior:'smooth',block:'start'}); });
      outlineEl.appendChild(a);
    });
  }

  /* ---- editing ---- */
  var rt=null;
  editor.addEventListener('input',function(){
    var t=activeTab(); if(!t) return;
    t.content=editor.value;
    clearTimeout(rt);
    rt=setTimeout(function(){ render(); renderTabs(); updateUI(); },110);
  });
  editor.addEventListener('keydown',function(e){
    if(e.key==='Tab'){ e.preventDefault();
      var s=editor.selectionStart, en=editor.selectionEnd;
      editor.value=editor.value.slice(0,s)+'  '+editor.value.slice(en);
      editor.selectionStart=editor.selectionEnd=s+2;
      editor.dispatchEvent(new Event('input'));
    }
  });

  /* ---- counts / status ---- */
  function counts(text){
    var words=(text.trim().match(/\S+/g)||[]).length;
    var lines=text? text.split('\n').length : 0;
    $('stCounts').innerHTML='<b>'+words+'</b> paraules · <b>'+lines+'</b> línies · <b>'+text.length+'</b> car.';
  }
  function updateUI(){
    var t=activeTab();
    $('stFile').textContent = t? (t.name + (t.content!==t.saved?'  (sense desar)':'')) : '—';
    $('stMode').textContent = showCode? 'Vista + Codi' : 'Vista';
    if(!t) $('stCounts').innerHTML='';
  }

  /* ---- toggles ---- */
  function toggleCode(){
    showCode=!showCode;
    workspace.classList.toggle('split',showCode);
    $('codeBtn').classList.toggle('on',showCode);
    if(showCode){ var t=activeTab(); editor.value=t?t.content:''; editor.focus(); }
    updateUI();
  }
  function toggleOutline(){
    var on=mainEl.classList.toggle('show-outline');
    $('outlineBtn').classList.toggle('on',on);
    if(on) render();
  }
  function setTheme(theme){
    document.documentElement.setAttribute('data-theme',theme);
    $('themeIcon').innerHTML = theme==='dark'? ICON_SUN : ICON_MOON;
  }

  /* ---- download ---- */
  function downloadActive(){
    var t=activeTab(); if(!t){ return; }
    var blob=new Blob([t.content],{type:'text/markdown;charset=utf-8'});
    var url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download=t.name; document.body.appendChild(a); a.click();
    a.remove(); URL.revokeObjectURL(url);
    t.saved=t.content; renderTabs(); updateUI();
  }

  /* ---- print ---- */
  function doPrintFormatted(){
    var t=activeTab(); if(!t) return;
    document.getElementById('printArea').innerHTML=
      '<div class="pa-meta"><span>'+esc(t.name)+'</span><span>Guaita .md</span></div>'+
      '<div class="markdown-body">'+marked.parse(t.content)+'</div>';
    window.print();
  }
  function doPrintCode(){
    var t=activeTab(); if(!t) return;
    var rows=t.content.split('\n').map(function(l,i){
      return '<div class="ln"><span class="n">'+(i+1)+'</span><span class="t">'+(l.length?esc(l):'\u200b')+'</span></div>';
    }).join('');
    document.getElementById('printArea').innerHTML=
      '<div class="pa-meta"><span>'+esc(t.name)+' · codi font</span><span>Guaita .md</span></div>'+
      '<div class="code-print">'+rows+'</div>';
    window.print();
  }

  /* ---- divider drag ---- */
  (function(){
    var d=$('divider'), dragging=false;
    var vertical=function(){ return matchMedia('(max-width:820px)').matches; };
    function move(e){
      if(!dragging) return;
      var r=workspace.getBoundingClientRect();
      if(vertical()){
        var pct=Math.min(85,Math.max(15,((e.clientY-r.top)/r.height)*100));
        workspace.style.setProperty('--split-v',pct+'%');
      } else {
        var p=Math.min(85,Math.max(15,((e.clientX-r.left)/r.width)*100));
        workspace.style.setProperty('--split',p+'%');
      }
    }
    d.addEventListener('pointerdown',function(e){ dragging=true; d.classList.add('drag'); d.setPointerCapture(e.pointerId); });
    d.addEventListener('pointermove',move);
    d.addEventListener('pointerup',function(e){ dragging=false; d.classList.remove('drag'); d.releasePointerCapture(e.pointerId); });
  })();

  /* ---- drag & drop ---- */
  var dragDepth=0;
  ['dragenter','dragover'].forEach(function(ev){ window.addEventListener(ev,function(e){ e.preventDefault(); }); });
  window.addEventListener('dragenter',function(e){ if(e.dataTransfer&&Array.prototype.some.call(e.dataTransfer.types,function(t){return t==='Files'})){ dragDepth++; drop.classList.add('show'); } });
  window.addEventListener('dragleave',function(){ dragDepth=Math.max(0,dragDepth-1); if(!dragDepth) drop.classList.remove('show'); });
  window.addEventListener('drop',function(e){ e.preventDefault(); dragDepth=0; drop.classList.remove('show'); if(e.dataTransfer&&e.dataTransfer.files) openFiles(e.dataTransfer.files); });

  /* ---- wire up ---- */
  var fi=$('fileInput');
  function pick(){ fi.value=''; fi.click(); }
  $('openBtn').addEventListener('click',pick);
  $('emptyOpenBtn').addEventListener('click',pick);
  fi.addEventListener('change',function(){ openFiles(fi.files); });
  $('codeBtn').addEventListener('click',toggleCode);
  $('outlineBtn').addEventListener('click',toggleOutline);
  $('downloadBtn').addEventListener('click',downloadActive);
  $('printBtn').addEventListener('click',function(e){ e.stopPropagation(); $('printMenu').classList.toggle('show'); });
  $('printFmt').addEventListener('click',function(){ $('printMenu').classList.remove('show'); doPrintFormatted(); });
  $('printCode').addEventListener('click',function(){ $('printMenu').classList.remove('show'); doPrintCode(); });
  document.addEventListener('click',function(){ $('printMenu').classList.remove('show'); });
  $('themeBtn').addEventListener('click',function(){
    setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  });
  window.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='e'){ e.preventDefault(); toggleCode(); }
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='o'){ e.preventDefault(); pick(); }
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){ e.preventDefault(); downloadActive(); }
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='p'){ e.preventDefault(); doPrintFormatted(); }
  });

  setTheme('dark');
  updateUI();
})();
</script>
